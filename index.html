<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="apple-touch-icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="སློབ་ཚན།">
    
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face { font-family: 'danzeng'; src: url('danzeng.ttf') format('truetype'); }
        :root { 
            --bg: #f8f9fa; --blue: #007aff; --green: #27ae60; --orange: #e67e22; 
            --white: #ffffff; --tibetan-red: #B22222; --indigo: #004080;
            --art-red: #FF0000; --music-blue: #0000FF; --calligraphy-navy: #000080; --other-gray: #A9A9A9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100svh; width: 100vw; background: var(--bg); 
            font-family: 'danzeng', -apple-system, sans-serif;
            overflow: hidden; position: fixed;
        }
        .wrapper {
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            background: linear-gradient(rgba(248,249,250,0.92), rgba(248,249,250,0.92)), url('apple-touch-icon.png') no-repeat center center;
            background-size: 140px auto; 
        }
        .nav-bar { position: relative; height: 44px; display: flex; align-items: center; padding: 0 10px; flex-shrink: 0; }
        .nav-left { position: absolute; left: 10px; z-index: 10; }
        .nav-right { position: absolute; right: 10px; z-index: 10; }
        .t-name { width: 100%; text-align: center; font-size: 20px; font-weight: bold; color: var(--indigo); }
        .time-display { font-size: 13px; color: var(--blue); font-weight: bold; }
        .btn-mini { background: var(--green); color: #fff; border: none; border-radius: 4px; padding: 6px 10px; font-family: 'danzeng'; cursor: pointer; }
        
        .status-area { padding: 0 10px; margin-bottom: 4px; flex-shrink: 0; }
        #msg { 
            font-size: 18px; font-weight: bold; color: var(--tibetan-red); 
            border: 2px solid var(--tibetan-red); border-top: 4px solid var(--tibetan-red);
            border-radius: 8px; padding: 8px; text-align: center; min-height: 44px;
            background: rgba(255, 255, 255, 0.7);
        }

        .content-area { flex: 1; display: flex; flex-direction: column; gap: 4px; padding: 0 8px; overflow: hidden; padding-bottom: 0; }
        .section-box { 
            display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.6); 
            border-radius: 8px; border: 1px solid var(--tibetan-red); border-top: 5px solid var(--tibetan-red);
        }
        /* 4:3 Ratio Implementation via Flex Grow */
        #grid-morning { flex: 4; }
        #grid-afternoon { flex: 3; }

        .grid-row { display: flex; flex: 1; border-bottom: 1px solid var(--indigo); min-height: 0; }
        .grid-row:last-child { border-bottom: none; }
        .grid-header { background: rgba(252, 252, 252, 0.6); flex: 0 0 32px; font-weight: bold; color: #008080; }
        
        .cell { flex: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--indigo); font-size: 14px; position: relative; overflow: hidden; padding: 0 2px; }
        .cell:last-child { border-right: none; }
        .cell-inner { display: inline-block; white-space: nowrap !important; word-break: keep-all !important; transform-origin: center center; flex-shrink: 0; font-weight: bold; }
        .num-col { flex: 0 0 12%; color: var(--blue); background: rgba(250, 250, 250, 0.6); font-weight: bold; }
        .col-today-header { background-color: rgba(255, 250, 250, 0.8); color: var(--tibetan-red); }
        .active-cell { background-color: #ADD8E6 !important; color: #000 !important; }
        .active-cell .cell-inner { color: #000 !important; }
        
        @media (orientation: landscape) {
            .wrapper { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); max-width: 800px; margin: 0 auto; }
        }
        @media (orientation: portrait) {
            .content-area { padding-bottom: 20px; }
        }
        .diag-svg { position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none; }

        .art { color: var(--art-red); }
        .music { color: var(--music-blue); }
        .calligraphy { color: var(--calligraphy-navy); }
        .other { color: var(--other-gray); }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="nav-bar">
        <div class="nav-left"><button class="btn-mini" id="audioBtn" onclick="activateAudio()">སྒྲ་གཏོང་ལམ་བཟོ་བ།</button></div>
        <div class="t-name">༢༠༢༦-ཁམས་པ་ཚང་།</div>
        <div class="nav-right"><div class="time-display" id="real-time">--:--:--</div></div>
    </div>
    <div class="status-area"><div id="msg">...</div></div>
    <div class="content-area">
        <div class="section-box" id="grid-morning"></div>
        <div class="section-box" id="grid-afternoon"></div>
    </div>
</div>

<script>
    let audioCtx = null, currentReminderKey = "";
    let isSpeaking = false, stopSpeech = false;

    const toM = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

    const slots = [{s: "09:30", e: "10:10"}, {s: "10:25", e: "11:05"}, {s: "11:30", e: "12:10"}, {s: "12:25", e: "13:05"}, {s: "15:00", e: "15:40"}, {s: "15:55", e: "16:35"}, {s: "16:50", e: "17:30"}];
    const mData = [["༡","","","","","","",""],["༢","","","","","","",""],["༣","རི་མོ།༢","","","རི་མོ།༢","","",""],["༤","ངལ་རྩོལ།","","","","ཡིགཟུགས།","",""]];
    const aData = [["༡","","རི་མོ།༢","","","","",""],["༢","","","གླུ་གཞས།","","སློབ་གསོ།","",""],["༣","","རི་མོ།༡","","","","",""]];

    function getLessonClass(name) {
        if (!name) return "";
        if (name.includes("རི་མོ།")) return "art";
        if (name.includes("གླུ་གཞས།")) return "music";
        if (name.includes("ཡིགཟུགས།")) return "calligraphy";
        return "other";
    }

    function render(id, data, startIdx) {
        const el = document.getElementById(id);
        let h = `<div class="grid-row grid-header"><div class="cell num-col" style="position:relative"><svg class="diag-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100" stroke="#B22222" stroke-width="1.5"/></svg></div>`;
        ["ཟླ་བ།","མིག་དམར།","ལྷག་པ།","ཕུར་བུ།","པ་སངས་།","སྤེན་པ།","ཉི་མ།"].forEach(d => h += `<div class="cell"><span class="cell-inner">${d}</span></div>`);
        el.innerHTML = h + `</div>` + data.map((r, i) => 
            `<div class="grid-row"><div class="cell num-col"><span class="cell-inner">${r[0]}</span></div>` + 
            r.slice(1).map((c, j) => {
                const cls = c ? getLessonClass(c) : "";
                return `<div class="cell" id="c-${startIdx+i}-${j+1}"><span class="cell-inner ${cls}">${c}</span></div>`;
            }).join('') + `</div>`
        ).join('');
    }
    render('grid-morning', mData, 0); render('grid-afternoon', aData, 4);

    function getCuteVoice(u) {
        u.lang = 'zh-CN';
        const voices = window.speechSynthesis.getVoices();
        
        let targetVoice = null;

        // 1. 尝试直接找 "月" (Yue)
        targetVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Yue') || v.name.includes('月')));
        
        // 2. 如果没找到，尝试找 "系统默认" (Default) 的中文声音
        // 既然您在系统设置里把“月”设为了默认，这一步应该能抓到它
        if (!targetVoice) {
            targetVoice = voices.find(v => v.lang.includes('zh') && v.default);
        }

        // 3. 如果还是没有，尝试找 "Siri"
        if (!targetVoice) {
            targetVoice = voices.find(v => v.lang.includes('zh') && v.name.includes('Siri'));
        }

        // 4. 尝试找 "Ting-Ting" (婷婷)
        if (!targetVoice) {
            targetVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Ting-Ting') || v.name.includes('婷婷')));
        }

        // 5. 最后的兜底：随便给一个中文声音
        if (!targetVoice) targetVoice = voices.find(v => v.lang.includes('zh'));

        if (targetVoice) {
            u.voice = targetVoice;
            u.pitch = 1.0; 
            u.rate = 1.0; 
            // 调试信息：把选中的声音名字打印到红条上，方便您确认
            // console.log("Selected Voice:", targetVoice.name); 
        }
        u.volume = 1;
    }

    function speakSequence(text, count, intervalMs) {
        if (isSpeaking) window.speechSynthesis.cancel();
        stopSpeech = false;
        isSpeaking = true;
        
        const btn = document.getElementById('audioBtn');
        btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; // Keep text
        btn.style.background = "var(--orange)"; // Yellow for playing

        let remaining = count;
        const speakOne = () => {
            if (stopSpeech || remaining <= 0) {
                isSpeaking = false;
                btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; // Audio Activated
                btn.style.background = "var(--blue)"; // Blue for active
                return;
            }
            
            const u = new SpeechSynthesisUtterance(text);
            getCuteVoice(u);
            
            u.onend = () => {
                remaining--;
                if (remaining > 0 && !stopSpeech) {
                    setTimeout(speakOne, intervalMs);
                } else {
                    isSpeaking = false;
                    btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།";
                    btn.style.background = "var(--blue)"; // Blue for active
                }
            };
            u.onerror = () => { isSpeaking = false; };
            
            window.speechSynthesis.speak(u);
        };
        speakOne();
    }

    let wakeLock = null;

    // 1. 标准屏幕常亮 API (Screen Wake Lock)
    // 只要屏幕亮着，倒计时逻辑就会一直运行，不会掉链子
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('Screen Wake Lock active');
            }
        } catch (err) {
            console.error(`${err.name}, ${err.message}`);
        }
    }

    // 2. 隐藏的音频播放器 - 强制后台保活的关键
    // 播放一段极短的静音，欺骗 iOS 认为我们在播放音乐，从而允许后台运行 JS
    let silentAudio = null;
    
    function initSilentAudio() {
        if (!silentAudio) {
            silentAudio = new Audio();
            // 使用一个极短的静音 Base64
            silentAudio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAwF0AAIC7AAACAgQAZGF0YQAAAAA=';
            silentAudio.loop = true;
            silentAudio.volume = 0.01; // 极低音量，人耳听不见但系统认为在播放
            
            // 关键：在用户交互（点击按钮）时必须触发 play()
            silentAudio.play().then(() => {
                console.log('Silent audio playing - Background mode active');
            }).catch(e => console.error("Silent audio failed:", e));
        }
    }

    function activateAudio() {
        const btn = document.getElementById('audioBtn');
        if (isSpeaking) {
            // ... (停止逻辑保持不变)
            stopSpeech = true;
            window.speechSynthesis.cancel();
            isSpeaking = false;
            btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; // Audio Activated
            btn.style.background = "var(--green)"; // Reset to Green (Idle)
            // 注意：不要暂停 silentAudio，继续保持后台活性
            return;
        }
        
        // 启动屏幕常亮
        requestWakeLock();
        
        // 启动静音音频保活 (这是新加的黑科技)
        initSilentAudio();

        const successText = "老师，提醒声音激活成功";
        const failText = "老师，提醒声音激活失败了";

        try {
            if (!window.speechSynthesis) throw new Error("TTS not supported");

            // 确保语音列表已加载（部分浏览器需要等待 onvoiceschanged）
            if (window.speechSynthesis.getVoices().length === 0) {
                window.speechSynthesis.onvoiceschanged = () => activateAudio();
                return;
            }

            const u = new SpeechSynthesisUtterance(successText);
            getCuteVoice(u);
            
            u.onend = () => {
                // Success State
                btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།";
                btn.style.background = "var(--blue)";
            };

            u.onerror = (e) => {
                console.error("TTS Error:", e);
                // Try to speak failure message if possible
                const uFail = new SpeechSynthesisUtterance(failText);
                getCuteVoice(uFail);
                window.speechSynthesis.speak(uFail);
                
                // Fail State
                btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོ་མ་ཐུབ།";
                btn.style.background = "var(--art-red)";
            };

            window.speechSynthesis.speak(u);

        } catch (e) {
            console.error(e);
            alert("您的设备不支持语音播报功能");
            btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོ་མ་ཐུབ།";
            btn.style.background = "var(--art-red)";
        }
    }
    
    // 页面可见性改变时重新申请 Wake Lock，确保切回来时继续常亮
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });
    
    // 页面可见性改变时重新申请 Wake Lock
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    function doAutoScale() {
        document.querySelectorAll('.cell').forEach(cell => {
            const inner = cell.querySelector('.cell-inner');
            if (!inner || inner.innerText.trim() === "") return;
            inner.style.transform = 'scale(1)'; 
            const containerWidth = cell.clientWidth - 4; 
            const contentWidth = inner.offsetWidth; 
            if (contentWidth > containerWidth && containerWidth > 0) {
                inner.style.transform = `scale(${containerWidth / contentWidth})`;
            }
        });
    }

    function refresh() {
        const now = new Date(), currentM = now.getHours() * 60 + now.getMinutes(), day = now.getDay() || 7;
        document.getElementById('real-time').innerText = now.toTimeString().slice(0, 8);
        
        // Reset highlights
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-cell'));
        document.querySelectorAll('.col-today-header').forEach(c => c.classList.remove('col-today-header'));
        
        // Highlight Today Header
        const dayIdx = day; // 1-7
        document.querySelectorAll('.grid-header').forEach(headerRow => {
            const cells = headerRow.querySelectorAll('.cell');
            if (cells[dayIdx]) cells[dayIdx].classList.add('col-today-header');
        });
        
        let currentLessonIdx = -1;
        slots.forEach((s, i) => {
            const startM = toM(s.s), endM = toM(s.e);
            if (currentM >= startM && currentM < endM) {
                currentLessonIdx = i;
                document.getElementById(`c-${i}-${day}`)?.classList.add('active-cell');
            }
            if (day < 6) {
                // 40 min reminder
                if (currentM === (startM - 40) && currentReminderKey !== `r-${i}-40`) {
                    currentReminderKey = `r-${i}-40`;
                    speakSequence("康老师，离开课只有40分钟，请您准备前往学校，路上注意安全。", 20, 5000);
                }
                // 5 min reminder
                if (currentM === (startM - 5) && currentReminderKey !== `r-${i}-5`) {
                    currentReminderKey = `r-${i}-5`;
                    speakSequence("康老师，离开课只有5分钟了，请您准备好进教室了，学生们都在等着您呢。", 5, 5000);
                }
            }
        });
        
        doAutoScale();

        const msgEl = document.getElementById('msg');
        const myKeys = ["རི་མོ།", "གླུ་གཞས།", "ཡིགཟུགས།"];
        const fullData = [...mData, ...aData];
        const myTodayLessons = fullData.map((r, i) => myKeys.some(k => r[day].includes(k)) ? i : -1).filter(i => i !== -1);
        
        if (day >= 6) { msgEl.innerText = "དགེན་ལགས་གཟའ་མཇུག་སྤྲོ། ངལ་གསོ་ལྷོད་ལྷོད་གནང་རོགས།"; } 
        else if (currentLessonIdx !== -1 && myTodayLessons.includes(currentLessonIdx)) { msgEl.innerText = "ད་ལྟ་སློབ་ཚན་ཚོགས་བཞིན་པ་ཡིན།"; } 
        else if (myTodayLessons.length > 0 && currentM >= toM(slots[myTodayLessons[myTodayLessons.length-1]].e)) { msgEl.innerText = "དེ་རིང་གི་སློབ་ཚན་མཇུག་སྒྲིལ་ཟིན།"; } 
        else { msgEl.innerText = "དགེན་ལགས་དེ་རིང་སློབ་ཚན་ཡོད།"; }
    }

    setInterval(refresh, 1000);
    window.addEventListener('resize', doAutoScale);
    document.fonts.ready.then(doAutoScale);
    refresh();
</script>
</body>
</html>
