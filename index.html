<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="apple-touch-icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="སློབ་ཚན།">
    
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face { font-family: 'danzeng'; src: url('danzeng.ttf') format('truetype'); }
        /* Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #f8f9fa;
            --deep-blue: #004080;
            --tibetan-red: #B22222;
            --blue: #007bff;
            --green: #28a745;
            --orange: #e67e22;
        }
/* 确保界面内容铺满 iPhone 16 Pro Max 这种长屏幕 */
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'danzeng', sans-serif;
            background: var(--bg);
            user-select: none;
            -webkit-user-select: none;
            /* 修正：移除 flex:1 自动撑开，改回绝对高度控制，防止循环拉伸 */
        }
        #app {
            display: grid;
            grid-template-rows: 50px 60px 1fr; /* 固定高度：顶部栏、状态栏，剩余给内容 */
            width: 100%;
            height: 100vh; /* 强制视口高度 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            background: transparent;
            position: relative;
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--deep-blue);
            white-space: nowrap;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        #weekday-display, #real-time {
            font-size: 1.2rem;
            color: var(--blue);
            font-weight: bold;
            z-index: 2;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--tibetan-red);
            background: rgba(255,255,255,0.7);
            margin: 0 10px 5px 10px;
            border: 2px solid var(--tibetan-red);
            border-top: 7px solid var(--tibetan-red);
            border-radius: 8px;
        }

        .content-area {
            display: grid;
            grid-template-rows: 5fr 3fr; /* 5:3 比例 */
            padding: 0 10px 10px 10px;
            gap: 5px;
            overflow: hidden;
            /* 修正：增加底部 padding，防止内容紧贴屏幕边缘被截断 */
            padding-bottom: max(10px, env(safe-area-inset-bottom)); 
        }

        .grid-container {
            width: 100%;
            height: 100%; /* 填满 grid 单元格 */
            border: 2px solid var(--tibetan-red);
            border-top: 7px solid var(--tibetan-red);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
        }

        /* Grid */
        .grid-header, .grid-row {
            display: flex;
            width: 100%;
            /* 修正：让表头和内容行都自动平分高度 */
            flex: 1; 
        }
        .grid-header { 
            /* flex: 0 0 32px; */ /* Removed fixed height */
            background: rgba(255,255,255,0.6); 
            font-size: 1.4rem; 
            font-weight: bold; color: #008080;
            /* Header Bottom Border: Deep Blue */
            border-bottom: 1px solid var(--deep-blue);
        }
        .grid-row { 
            flex: 1; 
            min-height: 0;
            /* Row Bottom Border (except last): Deep Blue */
            border-bottom: 1px solid var(--deep-blue); 
        }
        .grid-row:last-child {
            border-bottom: none;
        }

        .cell {
            flex: 1; 
            /* Cell Right Border: Deep Blue */
            border-right: 1px solid var(--deep-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.6rem; 
            padding: 2px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }
        .cell:last-child {
            border-right: none;
        }
        /* Cell Content */
.cell-inner {
    display: inline-block;
    white-space: nowrap;
    transform-origin: center; /* Scale from center */
    font-size: 100%; /* Ensure base size */
    line-height: 1.5; /* 增加行高，给上加字留空间 */
    padding-top: 4px; /* 稍微给点顶部内边距 */
}
        .num-col {
            flex: 0 0 45px; 
            background: #f8f9fa;
            color: var(--blue);
            font-weight: bold;
            font-size: 1.4rem;
            /* Num Col Right Border: Deep Blue */
            border-right: 2px solid var(--deep-blue); /* Thicker separator */
        }
        .col-today-header { background-color: rgba(255, 250, 250, 0.8); color: var(--tibetan-red); }
        .active-cell { background-color: #ADD8E6 !important; color: #000 !important; }
        .active-cell .cell-inner { color: #000 !important; }
        
/* Cleaned CSS */
        .diag-svg { position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none; }

        .c-red { color: #f00 !important; font-weight: bold; }
        .c-blue { color: #00f !important; font-weight: bold; }
        .c-navy { color: #000080 !important; font-weight: bold; }
        .c-gray { color: #808080 !important; font-weight: bold; }
    </style>
</head>
<body>
<div id="app">
    <!-- Top Bar -->
    <div class="top-bar">
        <div id="weekday-display">གཟའ་...</div>
        <div class="title">ཁམས་པ་ཚང་།</div>
        <div id="real-time">...</div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="status-text">...</div>

    <!-- Content Area -->
    <div class="content-area">
        <div id="grid-morning" class="grid-container"></div>
        <div id="grid-afternoon" class="grid-container"></div>
    </div>
</div>

<script>
/* Logic cleaned */

    const toM = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

    const slots = [{s: "09:30", e: "10:10"}, {s: "10:25", e: "11:05"}, {s: "11:30", e: "12:10"}, {s: "12:25", e: "13:05"}, {s: "15:00", e: "15:40"}, {s: "15:55", e: "16:35"}, {s: "16:50", e: "17:30"}];
    // Split Data
    const mData = [
        ["༡","","","","",""],
        ["༢","","","","",""],
        ["༣","རི་མོ།༢","","","རི་མོ།༢",""],
        ["༤","ངལ་རྩོལ།","","","","ཡིགཟུགས།"]
    ];
    const aData = [
        ["༥","","རི་མོ།༢","","",""],
        ["༦","","","གླུ་གཞས།","","སློབ་གསོ།"],
        ["༧","","རི་མོ།༡","","",""]
    ];

    function getLessonClass(name) {
        if (!name) return "";
        if (name.includes("རི་མོ།")) return "c-red";
        if (name.includes("གླུ་གཞས།")) return "c-blue";
        if (name.includes("ཡིགཟུགས།")) return "c-navy";
        return "c-gray";
    }

    const days = ["ཟླ་བ།","མིག་དམར།","ལྷག་པ།","ཕུར་བུ།","པ་སངས་།","སྤེན་པ།","ཉི་མ།"];

/* Logic cleaned */
    
    // Unified Render
    function render(id, data, showHeader) {
        const el = document.getElementById(id);
        let h = '';
        if (showHeader) {
            h = `<div class="grid-row grid-header"><div class="cell num-col" style="position:relative; background: linear-gradient(to bottom right, rgba(255,255,255,0.6) 50%, #f8f9fa 50%); border-right: 2px solid var(--deep-blue);"><svg class="diag-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100" stroke="var(--deep-blue)" stroke-width="1.5"/></svg></div>`;
            days.slice(0, 5).forEach(d => h += `<div class="cell"><span class="cell-inner">${d}</span></div>`);
            h += `</div>`;
        }
        el.innerHTML = h + data.map((r, i) => 
            `<div class="grid-row"><div class="cell num-col"><span class="cell-inner">${r[0]}</span></div>` + 
            r.slice(1).map((c, j) => `<div class="cell ${getLessonClass(c)}" id="c-${showHeader ? i : i+4}-${j + 1}"><span class="cell-inner">${c}</span></div>`).join('') + 
            `</div>`
        ).join('');
    }
    render('grid-morning', mData, true);
    render('grid-afternoon', aData, false); // No header for afternoon

    function doAutoScale() {
        // 只需要计算字体大小，表格布局完全由 CSS Grid 处理
        const container = document.querySelector('.content-area');
        const availableH = container.clientHeight;
        
        // 估算行高用于字体缩放
        const cellH = availableH / 8;
        const baseSize = Math.min(window.innerWidth / 16, cellH * 0.5); 
        document.body.style.fontSize = `${baseSize}px`;
        
        // Uniform Scale based on Tuesday
        let targetScale = 1.0;
        const headerRow = document.querySelector('.grid-header');
        if (headerRow) {
            const cells = headerRow.querySelectorAll('.cell');
            if (cells[2]) { // Tue
                const span = cells[2].querySelector('.cell-inner');
                if (span) {
                    span.style.transform = 'none';
                    span.style.display = 'inline-block';
                    const pW = span.parentElement.clientWidth - 4;
                    const sW = span.scrollWidth;
                    if (sW > pW && pW > 0) {
                        targetScale = pW / sW;
                    }
                }
            }
        }
        
        const cells = document.querySelectorAll('.cell-inner');
        cells.forEach(span => {
            span.style.transform = 'none';
            span.style.display = 'inline-block';
            
            const parent = span.parentElement;
            const parentW = parent.clientWidth - 4;
            const spanW = span.scrollWidth;
            const parentH = parent.clientHeight - 4;
            const spanH = span.scrollHeight;
            
            let selfScaleW = 1.0;
            if (spanW > parentW && parentW > 0) selfScaleW = parentW / spanW;
            
            let selfScaleH = 1.0;
            if (spanH > parentH && parentH > 0) selfScaleH = parentH / spanH;
            
            const selfScale = Math.min(selfScaleW, selfScaleH);
            span.style.transform = `scale(${Math.min(selfScale, targetScale) * 0.95})`;
        });
    }

    function refresh() {
        const now = new Date(), currentM = now.getHours() * 60 + now.getMinutes(), day = now.getDay() || 7;
        document.getElementById('real-time').innerText = now.toTimeString().slice(0, 8);
        document.getElementById('weekday-display').innerText = "རེས་གཟའ།" + (days[day-1] || "...");
        
        document.querySelectorAll('.cell').forEach(c => {
            c.style.background = '';
            c.style.color = ''; 
            c.style.fontWeight = '';
        });
        
        if (day >= 1 && day <= 5) {
             const dayIdx = day; 
             document.querySelectorAll('.grid-header').forEach(header => {
                 const cells = header.querySelectorAll('.cell');
                 if (cells[dayIdx]) {
                     cells[dayIdx].style.color = 'var(--tibetan-red)'; 
                     cells[dayIdx].style.fontWeight = 'bold';
                 }
             });
        }

        const myKeys = ["རི་མོ།", "གླུ་གཞས།", "ཡིགཟུགས།"];
        let myLessonIndices = [];
        
        const fullData = [...mData, ...aData];
        fullData.forEach((row, idx) => {
            if (myKeys.some(k => row[day] && row[day].includes(k))) {
                myLessonIndices.push(idx);
            }
        });

        let currentLessonIdx = -1;
        slots.forEach((s, i) => {
            const startM = toM(s.s), endM = toM(s.e);
            if (currentM >= startM && currentM < endM) {
                currentLessonIdx = i;
                if (day >= 1 && day <= 5) {
                    const cellId = `c-${i}-${day}`;
                    const cell = document.getElementById(cellId);
                    if (cell) {
                        cell.style.background = '#ADD8E6'; 
                    }
                }
            }
        });
        
        doAutoScale();

        // 5. Update Status Text
        const statusEl = document.getElementById('status-text');
        if (statusEl) {
             // 逻辑修正：严格按照用户要求
             
             // 1. 周末 -> 休息
             if (day >= 6) { 
                 statusEl.innerText = "དགེན་ལགས་གཟའ་མཇུག་སྤྲོ།";
             } 
             // 2. 今天完全没课 -> 提示无课
             else if (myLessonIndices.length === 0) {
                 statusEl.innerText = "དེ་རིང་སློབ་ཚན་མེད།";
             }
             // 3. 正在上我的课 -> 提示上课中
             else if (currentLessonIdx !== -1 && myLessonIndices.includes(currentLessonIdx)) { 
                 statusEl.innerText = "ད་ལྟ་སློབ་ཚན་ཚོགས་བཞིན་པ་ཡིན།"; 
             } 
             // 4. 我的课全部结束 -> 提示结束
             // 只有当时间超过了我最后一节课的结束时间
             else {
                 const lastMyLessonIdx = myLessonIndices[myLessonIndices.length - 1];
                 const lastEndTime = toM(slots[lastMyLessonIdx].e);
                 
                 if (currentM >= lastEndTime) {
                     statusEl.innerText = "དེ་རིང་གི་སློབ་ཚན་མཇུག་སྒྲིལ་ཟིན།"; 
                 } else {
                     // 5. 有课但还没开始（或课间） -> 提示有课
                     statusEl.innerText = "དགེན་ལགས་དེ་རིང་སློབ་ཚན་ཡོད།"; 
                 }
             }
        }
    }

    setInterval(refresh, 1000);
    window.addEventListener('resize', doAutoScale);
    document.fonts.ready.then(doAutoScale);
    refresh();
</script>
</body>
</html>
