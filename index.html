<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="apple-touch-icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="སློབ་ཚན།">
    
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face { font-family: 'danzeng'; src: url('danzeng.ttf') format('truetype'); }
        /* Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #f8f9fa;
            --deep-blue: #004080;
            --tibetan-red: #B22222;
            --blue: #007bff;
            --green: #28a745;
            --orange: #e67e22;
        }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'danzeng', sans-serif;
            background: var(--bg);
            user-select: none;
            -webkit-user-select: none;
        }
        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Top Bar */
        .top-bar {
            flex: 0 0 44px;
            display: flex;
            align-items: center;
            /* justify-content: space-between; */
            padding: 0 10px;
            background: transparent;
            position: relative; /* For absolute centering */
        }
        .top-bar button {
            font-family: 'danzeng';
            font-size: 1.2rem;
            padding: 4px 8px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 4px;
            /* 强制不换行 */
            white-space: nowrap;
            /* 放在左边 */
            z-index: 2;
        }
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--deep-blue);
            white-space: nowrap;
            /* 绝对居中 */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            width: auto;
        }
        #real-time {
            /* 强制不换行 */
            white-space: nowrap;
            /* 放在右边 */
            margin-left: auto;
            z-index: 2;
        }

        /* Status Bar */
.status-bar {
    flex: 0 0 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: bold;
    color: var(--tibetan-red);
    background: rgba(255,255,255,0.7);
    margin: 0 10px 5px 10px;
    /* 外边框：藏红色，默认 2px */
    border: 2px solid var(--tibetan-red);
    /* 顶部边框：特粗 7px (5px + 2px) */
    border-top: 7px solid var(--tibetan-red);
    border-radius: 8px;
}

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 10px 10px 10px;
            gap: 5px;
            overflow: hidden;
        }

        .grid-container {
    width: 100%;
    /* 外边框：藏红色，默认 2px */
    border: 2px solid var(--tibetan-red);
    /* 顶部边框：特粗 7px (5px + 2px) */
    border-top: 7px solid var(--tibetan-red);
    border-radius: 8px;
    overflow: hidden;
    background: rgba(255,255,255,0.8);
    display: flex;
    flex-direction: column;
}
        /* 4:3 Ratio Implementation via Flex Grow */
        #grid-morning { flex: 4; }
        #grid-afternoon { flex: 3; }

        /* Grid */
        .grid-header, .grid-row {
            display: flex;
            width: 100%;
        }
        .grid-header { 
            flex: 0 0 32px; 
            background: rgba(255,255,255,0.6); 
            font-size: 1.4rem; 
            font-weight: bold; color: #008080;
            /* Header Bottom Border: Deep Blue */
            border-bottom: 1px solid var(--deep-blue);
        }
        .grid-row { 
            flex: 1; 
            min-height: 0;
            /* Row Bottom Border (except last): Deep Blue */
            border-bottom: 1px solid var(--deep-blue); 
        }
        .grid-row:last-child {
            border-bottom: none;
        }

        .cell {
            flex: 1; 
            /* Cell Right Border: Deep Blue */
            border-right: 1px solid var(--deep-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.6rem; 
            padding: 2px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }
        .cell:last-child {
            border-right: none;
        }
        /* Cell Content */
.cell-inner {
    display: inline-block;
    white-space: nowrap;
    transform-origin: center; /* Scale from center */
    font-size: 100%; /* Ensure base size */
    line-height: 1.5; /* 增加行高，给上加字留空间 */
    padding-top: 4px; /* 稍微给点顶部内边距 */
}
        .num-col {
            flex: 0 0 45px; 
            background: #f8f9fa;
            color: var(--blue);
            font-weight: bold;
            font-size: 1.4rem;
            /* Num Col Right Border: Deep Blue */
            border-right: 2px solid var(--deep-blue); /* Thicker separator */
        }
        .col-today-header { background-color: rgba(255, 250, 250, 0.8); color: var(--tibetan-red); }
        .active-cell { background-color: #ADD8E6 !important; color: #000 !important; }
        .active-cell .cell-inner { color: #000 !important; }
        
        @media (orientation: landscape) {
            .wrapper { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); max-width: 800px; margin: 0 auto; }
        }
        @media (orientation: portrait) {
            .content-area { padding-bottom: 20px; }
        }
        .diag-svg { position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none; }

        .c-red { color: #f00 !important; font-weight: bold; }
        .c-blue { color: #00f !important; font-weight: bold; }
        .c-navy { color: #000080 !important; font-weight: bold; }
        .c-gray { color: #808080 !important; font-weight: bold; }
    </style>
</head>
<body>
<div id="app">
    <!-- Top Bar -->
    <div class="top-bar">
        <button id="audioBtn" onclick="activateAudio()">སྒྲ་གཏོང་ལམ་བཟོ་བ།</button>
        <div class="title">༢༠༢༦-ཁམས་པ་ཚང་།</div>
        <div id="real-time" style="color:var(--blue); font-weight:bold;"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="status-text">...</div>

    <!-- Content Area -->
    <div class="content-area">
        <div id="grid-morning" class="grid-container"></div>
        <div id="grid-afternoon" class="grid-container"></div>
    </div>
</div>

<script>
    let audioCtx = null, currentReminderKey = "";
    let isSpeaking = false, stopSpeech = false;
    // let isAudioActivated = false; // REMOVED

    const toM = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

    const slots = [{s: "09:30", e: "10:10"}, {s: "10:25", e: "11:05"}, {s: "11:30", e: "12:10"}, {s: "12:25", e: "13:05"}, {s: "15:00", e: "15:40"}, {s: "15:55", e: "16:35"}, {s: "16:50", e: "17:30"}];
    // Data
    // 0:Num, 1:Mon, 2:Tue, 3:Wed, 4:Thu, 5:Fri (Removed Sat/Sun)
    const mData = [
        ["༡","","","","",""],
        ["༢","","","","",""],
        ["༣","རི་མོ།༢","","","རི་མོ།༢",""],
        ["༤","ངལ་རྩོལ།","","","","ཡིགཟུགས།"]
    ];
    const aData = [
        ["༡","","རི་མོ།༢","","",""],
        ["༢","","","གླུ་གཞས།","","སློབ་གསོ།"],
        ["༣","","རི་མོ།༡","","",""]
    ];

    function getLessonClass(name) {
        if (!name) return "";
        if (name.includes("རི་མོ།")) return "c-red";
        if (name.includes("གླུ་གཞས།")) return "c-blue";
        if (name.includes("ཡིགཟུགས།")) return "c-navy";
        return "c-gray";
    }

    const days = ["ཟླ་བ།","མིག་དམར།","ལྷག་པ།","ཕུར་བུ།","པ་སངས་།"];

    function render(id, data, startIdx) {
        const el = document.getElementById(id);
        let h = `<div class="grid-row grid-header"><div class="cell num-col" style="position:relative"><svg class="diag-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100" stroke="#B22222" stroke-width="1.5"/></svg></div>`;
        days.forEach(d => h += `<div class="cell"><span class="cell-inner">${d}</span></div>`);
        el.innerHTML = h + `</div>` + data.map((r, i) => 
            `<div class="grid-row"><div class="cell num-col"><span class="cell-inner">${r[0]}</span></div>` + 
            r.slice(1).map((c, j) => `<div class="cell ${getLessonClass(c)}" id="c-${startIdx + i}-${j + 1}"><span class="cell-inner">${c}</span></div>`).join('') + 
            `</div>`
        ).join('');
    }
    render('grid-morning', mData, 0); render('grid-afternoon', aData, 4);

    function getCuteVoice(u) {
        u.lang = 'zh-CN';
        const voices = window.speechSynthesis.getVoices();
        let targetVoice = null;
        // 强制优先寻找 "Yue" (Premium/Enhanced)
        targetVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Yue') || v.name.includes('月')));
        
        // 如果没有 Yue，才考虑其他的
        if (!targetVoice) targetVoice = voices.find(v => v.lang.includes('zh') && v.default);
        if (!targetVoice) targetVoice = voices.find(v => v.lang.includes('zh'));
        
        if (targetVoice) { u.voice = targetVoice; u.pitch = 1.0; u.rate = 1.0; }
        u.volume = 1;
    }

    function speakSequence(text, count, intervalMs) {
        if (isSpeaking) window.speechSynthesis.cancel();
        stopSpeech = false;
        isSpeaking = true;
        
        const btn = document.getElementById('audioBtn');
        btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; // Keep text
        btn.style.background = "var(--orange)"; // Yellow for playing

        let remaining = count;
        const speakOne = () => {
            if (stopSpeech || remaining <= 0) {
                isSpeaking = false;
                btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; // Audio Activated
                btn.style.background = "var(--blue)"; // Blue for active
                return;
            }
            
            const u = new SpeechSynthesisUtterance(text);
            getCuteVoice(u);
            
            u.onend = () => {
                remaining--;
                if (remaining > 0 && !stopSpeech) {
                    setTimeout(speakOne, intervalMs);
                } else {
                    isSpeaking = false;
                    btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།";
                    btn.style.background = "var(--blue)"; // Blue for active
                }
            };
            u.onerror = () => { 
                isSpeaking = false; 
                btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།";
                btn.style.background = "var(--blue)";
            };
            
            window.speechSynthesis.speak(u);
        };
        speakOne();
    }

    let wakeLock = null;

    // Wake Lock
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {}
    }

    // Silent Audio for Background
    let silentAudio = null;
    function initSilentAudio() {
        if (!silentAudio) {
            silentAudio = new Audio();
            silentAudio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAwF0AAIC7AAACAgQAZGF0YQAAAAA=';
            silentAudio.loop = true;
            silentAudio.volume = 0.01; 
            silentAudio.play().catch(()=>{});
        }
    }

    function activateAudio() {
        const btn = document.getElementById('audioBtn');
        if (isSpeaking) {
            stopSpeech = true;
            window.speechSynthesis.cancel();
            isSpeaking = false;
            btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; 
            btn.style.background = "var(--green)"; 
            return;
        }
        
        requestWakeLock();
        initSilentAudio();

        try {
            if (!window.speechSynthesis) return;

            if (window.speechSynthesis.getVoices().length === 0) {
                window.speechSynthesis.onvoiceschanged = () => activateAudio();
                return;
            }

            const u = new SpeechSynthesisUtterance("老师，提醒声音激活成功");
            getCuteVoice(u);
            
            u.onend = () => {
                btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།";
                btn.style.background = "var(--blue)";
            };

            u.onerror = () => {
                const uFail = new SpeechSynthesisUtterance("老师，提醒声音激活失败了");
                getCuteVoice(uFail);
                window.speechSynthesis.speak(uFail);
                btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོ་མ་ཐུབ།";
                btn.style.background = "var(--art-red)";
            };

            window.speechSynthesis.speak(u);

        } catch (e) {
            btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོ་མ་ཐུབ།";
            btn.style.background = "var(--art-red)";
        }
    }
    
    // 页面可见性改变时重新申请 Wake Lock，确保切回来时继续常亮
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    function doAutoScale() {
        const container = document.querySelector('.content-area');
        const totalH = container.clientHeight;
        const availableH = totalH - 4; // gap
        
        // 4:3 Ratio
        const morningH = (availableH * 4) / 7;
        const afternoonH = (availableH * 3) / 7;
        
        document.getElementById('grid-morning').style.height = `${morningH}px`;
        document.getElementById('grid-afternoon').style.height = `${afternoonH}px`;
        
        // Auto Scale Font & Content Fit (Unified)
        // 1. Calculate base size from grid height
        const cellH = morningH / 5;
        const baseSize = Math.min(window.innerWidth / 16, cellH * 0.5); 
        document.body.style.fontSize = `${baseSize}px`;
        
        // 2. Calculate Uniform Scale for Grid Content
        // 以“星期二”这列的文字大小为基准，所有文字都必须和它一样大。
        
        let targetScale = 1.0;
        // 找到表头里的星期二 (index 2 in days array, so it's the 3rd cell in header row)
        const headerRow = document.querySelector('.grid-header');
        if (headerRow) {
            const cells = headerRow.querySelectorAll('.cell');
            if (cells[2]) { // Tue
                const span = cells[2].querySelector('.cell-inner');
                if (span) {
                    // Reset to measure
                    span.style.transform = 'none';
                    span.style.display = 'inline-block';
                    const pW = span.parentElement.clientWidth - 4;
                    const sW = span.scrollWidth;
                    if (sW > pW && pW > 0) {
                        targetScale = pW / sW;
                    }
                }
            }
        }
        
        const cells = document.querySelectorAll('.cell-inner');
        cells.forEach(span => {
            span.style.transform = 'none';
            span.style.display = 'inline-block';
            
            const parent = span.parentElement;
            const parentW = parent.clientWidth - 4;
            const spanW = span.scrollWidth;
            const parentH = parent.clientHeight - 4;
            const spanH = span.scrollHeight;
            
            let selfScaleW = 1.0;
            if (spanW > parentW && parentW > 0) selfScaleW = parentW / spanW;
            
            let selfScaleH = 1.0;
            if (spanH > parentH && parentH > 0) selfScaleH = parentH / spanH;
            
            const selfScale = Math.min(selfScaleW, selfScaleH);
            
            // 结合用户意图：“文字大小为星期二的名字来统一”。
            // 所以最终 scale = Math.min(selfScale, targetScale);
            
            span.style.transform = `scale(${Math.min(selfScale, targetScale) * 0.95})`;
        });
    }

    function refresh() {
        const now = new Date(), currentM = now.getHours() * 60 + now.getMinutes(), day = now.getDay() || 7;
        document.getElementById('real-time').innerText = now.toTimeString().slice(0, 8);
        
        // 1. Reset highlights
        document.querySelectorAll('.cell').forEach(c => {
            // c.style.background = 'transparent'; // Keep background transparent (default) or whatever CSS set
            // Wait, active-cell sets background. We need to clear inline background if we set it before.
            c.style.background = ''; // Clear inline background
            c.style.color = ''; 
            c.style.fontWeight = ''; // Clear inline font-weight
        });
        
        // 2. Highlight Today Header (If Mon-Fri)
        if (day >= 1 && day <= 5) {
             const dayIdx = day; 
             document.querySelectorAll('.grid-header').forEach(header => {
                 const cells = header.querySelectorAll('.cell');
                 if (cells[dayIdx]) {
                     // 只改变文字颜色，不改变背景色
                     // cells[dayIdx].style.background = 'rgba(255, 235, 235, 0.9)'; // Removed background highlight
                     cells[dayIdx].style.color = 'var(--tibetan-red)'; // Text color only
                     cells[dayIdx].style.fontWeight = 'bold'; // Optional: make it bolder
                 }
             });
        }

        // 3. Find MY lessons for today
        const myKeys = ["རི་མོ།", "གླུ་གཞས།", "ཡིགཟུགས།"];
        let myLessonIndices = [];
        
        const fullData = [...mData, ...aData];
        fullData.forEach((row, idx) => {
            if (myKeys.some(k => row[day] && row[day].includes(k))) {
                myLessonIndices.push(idx);
            }
        });

        // 4. Main Loop: Check slots for current status and reminders
        let currentLessonIdx = -1;
        
        slots.forEach((s, i) => {
            const startM = toM(s.s), endM = toM(s.e);
            
            // A. Check Current Lesson Status
            if (currentM >= startM && currentM < endM) {
                currentLessonIdx = i;
                // Highlight active cell (only Mon-Fri)
                if (day >= 1 && day <= 5) {
                    const cellId = `c-${i}-${day}`;
                    const cell = document.getElementById(cellId);
                    if (cell) {
                        cell.style.background = '#ADD8E6'; 
                    }
                }
            }
            
            // B. Check Reminders (Only Mon-Fri)
            if (day >= 1 && day <= 5) {
                // Only for MY lessons
                if (myLessonIndices.includes(i)) {
                    // 40 min reminder
                    if (currentM === (startM - 40) && currentReminderKey !== `r-${day}-${i}-40`) {
                        currentReminderKey = `r-${day}-${i}-40`;
                        speakSequence("康老师，离开课只有40分钟，请您准备前往学校，路上注意安全。", 16, 5000);
                    }
                    // 5 min reminder
                    if (currentM === (startM - 5) && currentReminderKey !== `r-${day}-${i}-5`) {
                        currentReminderKey = `r-${day}-${i}-5`;
                        speakSequence("康老师，离开课只有5分钟了，请您准备好进教室了，学生们都在等着您呢。", 5, 5000);
                    }
                }
            }
        });
        
        doAutoScale();

        // 5. Update Status Text
        const statusEl = document.getElementById('status-text');
        if (statusEl) {
             if (day >= 6) { 
                 statusEl.innerText = "དགེན་ལགས་གཟའ་མཇུག་སྤྲོ། ངལ་གསོ་ལྷོད་ལྷོད་གནང་རོགས།"; 
             } else if (currentLessonIdx !== -1 && myLessonIndices.includes(currentLessonIdx)) { 
                 statusEl.innerText = "ད་ལྟ་སློབ་ཚན་ཚོགས་བཞིན་པ་ཡིན།"; 
             } else if (myLessonIndices.length > 0 && currentM >= toM(slots[myLessonIndices[myLessonIndices.length-1]].e)) { 
                 statusEl.innerText = "དེ་རིང་གི་སློབ་ཚན་མཇུག་སྒྲིལ་ཟིན།"; 
             } else { 
                 statusEl.innerText = "དགེན་ལགས་དེ་རིང་སློབ་ཚན་ཡོད།"; 
             }
        }
    }

    setInterval(refresh, 1000);
    window.addEventListener('resize', doAutoScale);
    document.fonts.ready.then(doAutoScale);
    refresh();
</script>
</body>
</html>
