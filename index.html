<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face { font-family: 'TibetWildYak'; src: url('TibetWildYak.ttf') format('truetype'); }
        :root { 
            --bg: #f8f9fa; 
            --blue: #007aff; 
            --green: #27ae60; 
            --orange: #e67e22; 
            --white: #ffffff; 
            --tibetan-red: #B22222; 
            --gray: #999999;
            --teal: #008080; 
            --butter-yellow: #FFFAFA;
            --indigo: #004080; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100svh; width: 100vw; background: var(--bg); 
            font-family: 'TibetWildYak', -apple-system, sans-serif;
            overflow: hidden; position: fixed; top: 0; left: 0;
        }

        .wrapper {
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: 1px; 
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            background: linear-gradient(rgba(248,249,250,0.96), rgba(248,249,250,0.96)), url('apple-touch-icon.png') no-repeat center;
            background-size: 160px auto;
        }

        /* 核心修正：优化顶部布局，实现自动收缩平衡 */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 4px 10px;
            gap: 8px;
        }

        .nav-left { flex: 0 1 auto; display: flex; }
        .nav-right { flex: 0 0 auto; display: flex; justify-content: flex-end; }
        .t-name { 
            flex: 1 1 auto;
            font-size: clamp(14px, 3vh, 22px); font-weight: bold; 
            color: var(--indigo); 
            line-height: 1.8; text-align: center; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }

        .btn-mini { 
            background: var(--green); color: #fff; border: none; border-radius: 4px; 
            padding: 4px 8px; font-size: clamp(10px, 1.8vh, 13px); 
            font-family: 'TibetWildYak'; cursor: pointer; white-space: nowrap;
            max-width: 140px; overflow: hidden; text-overflow: ellipsis;
        }

        .time-display {
            font-size: clamp(10px, 1.8vh, 13px); color: var(--blue); font-weight: bold;
            font-family: 'TibetWildYak', -apple-system, sans-serif; white-space: nowrap;
        }

        .status-area { padding: 0 10px; margin-bottom: 4px; }
        #msg { 
            font-size: clamp(14px, 2.5vh, 18px); font-weight: bold; 
            color: var(--tibetan-red); 
            background: transparent; 
            border: 2px solid var(--tibetan-red); 
            border-top: 4px solid var(--tibetan-red);
            border-radius: 8px; 
            padding: 6px; 
            min-height: 1.6em;
            display: flex; align-items: center; justify-content: center; 
            line-height: 1.4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .content-area { flex: 1; display: flex; flex-direction: column; gap: 4px; min-height: 0; padding: 0 8px; }
        .section-box:nth-child(1) { flex: 4; }
        .section-box:nth-child(2) { flex: 3; }
        .section-box {
            display: flex; flex-direction: column; background: #fff; border-radius: 8px;
            border: 1px solid var(--tibetan-red); 
            border-top: 5px solid var(--tibetan-red); 
            overflow: visible; min-height: 0;
        }

        .grid-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .grid-row { display: flex; flex: 1; border-bottom: 1px solid #eee; min-height: 0; }
        .grid-row:last-child { border-bottom: none; }
        .grid-header { background: #fcfcfc; flex: 0 0 auto; height: clamp(28px, 5.5vh, 36px); border-bottom: 1px solid #eee; }

        .cell { 
            flex: 1; width: 0; display: flex; align-items: center; justify-content: center;
            border-right: 1px solid #eee; font-size: clamp(11px, 2.5vh, 17px);
            text-align: center; line-height: 1.5; padding: 2px;
            position: relative;
        }
        .cell-inner { white-space: nowrap; display: inline-block; transform-origin: center; position: relative; z-index: 2; }
        
        .grid-header .cell { font-size: clamp(10px, 1.8vh, 14px); color: var(--teal); font-weight: bold; }
        .cell:last-child { border-right: none; }
        
        .num-col { flex: 0 0 12%; color: var(--blue); font-weight: bold; background: #fafafa; }

        /* 核心修正：加入透明度，使颜色更通透 */
        .active-cell { 
            background-color: rgba(178, 34, 34, 0.8) !important; 
            color: #ffffff !important;
            font-weight: bold; 
        }
        .active-cell .cell-inner { color: #ffffff !important; }
        
        .col-today { background-color: #fffafa; }

        @media (orientation: landscape) {
            .nav-bar { padding: 2px 20px; }
            .content-area { gap: 2px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-components">
        <div class="nav-bar">
            <div class="nav-left">
                <button class="btn-mini" id="audioBtn" onclick="activateAudio()">སྒྲ་གཏོང་ལམ་བཟོ་བ།</button>
            </div>
            <div class="t-name">དགེན་ཁམས་པ་ཚང་།</div>
            <div class="nav-right">
                <div class="time-display" id="real-time">--:--:--</div>
            </div>
        </div>
        <div class="status-area">
            <div id="msg">...</div>
        </div>
    </div>

    <div class="content-area">
        <div class="section-box">
            <div class="grid-container">
                <div class="grid-row grid-header">
                    <div class="cell num-col"><span class="cell-inner">ཚོགས་ཐེངས།</span></div>
                    <div class="cell"><span class="cell-inner">ཟླ་བ།</span></div><div class="cell"><span class="cell-inner">མིག་དམར།</span></div>
                    <div class="cell"><span class="cell-inner">ལྷག་པ།</span></div><div class="cell"><span class="cell-inner">ཕུར་བུ།</span></div>
                    <div class="cell"><span class="cell-inner">པ་སངས་།</span></div><div class="cell"><span class="cell-inner">སྤེན་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཉི་མ།</span></div>
                </div>
                <div id="grid-morning" style="display:contents"></div>
            </div>
        </div>
        <div class="section-box">
            <div class="grid-container">
                <div class="grid-row grid-header">
                    <div class="cell num-col"><span class="cell-inner">ཚོགས་ཐེངས།</span></div>
                    <div class="cell"><span class="cell-inner">ཟླ་བ།</span></div><div class="cell"><span class="cell-inner">མིག་དམར།</span></div>
                    <div class="cell"><span class="cell-inner">ལྷག་པ།</span></div><div class="cell"><span class="cell-inner">ཕུར་བུ།</span></div>
                    <div class="cell"><span class="cell-inner">པ་སངས་།</span></div><div class="cell"><span class="cell-inner">སྤེན་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཉི་མ།</span></div>
                </div>
                <div id="grid-afternoon" style="display:contents"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const cfg = { mS: "09:30", aS: "15:00", dur: 40, myKeys: ["རི་མོ།", "གླུ་གཞས།", "ཡིགཟུགས།"], otherKeys: ["ངལ་རྩོལ།", "སློབ་གསོ།"] };
    const morningData = [["༡","","","","","","",""],["༢","","","","","","",""],["༣","རི་མོ།༡","","","རི་མོ།༢","","",""],["༤","ངལ་རྩོལ།","","","","ཡིགཟུགས།","",""]];
    const afternoonData = [["༡","","རི་མོ།༢","","","","",""],["༢","","","གླུ་གཞས།","","སློབ་གསོ།","",""],["༣","","རི་མོ།༡","","","","",""]];
    
    let audioCtx = null, isAudioMuted = false, currentReminderKey = "", reminderStartTime = 0;
    function timeAdd(t, m) { let [h, min] = t.split(':').map(Number); let d = new Date(); d.setHours(h, min + m); return d.toTimeString().slice(0, 5); }

    const slots = [];
    let cm = cfg.mS; for(let i=0; i<4; i++) { let s = cm, e = timeAdd(s, cfg.dur); slots.push({s, e}); cm = timeAdd(e, i===1 ? 20 : 15); }
    let ca = cfg.aS; for(let i=0; i<3; i++) { let s = ca, e = timeAdd(s, cfg.dur); slots.push({s, e}); ca = timeAdd(e, 15); }

    function renderGrid(id, data, start) {
        const container = document.getElementById(id);
        data.forEach((r, idx) => {
            let row = document.createElement('div'); row.className = 'grid-row';
            row.innerHTML = `<div class="cell num-col"><span class="cell-inner">${r[0]}</span></div>`;
            for(let i=1; i<=7; i++) {
                let cell = document.createElement('div'); cell.className = 'cell';
                let inner = document.createElement('span'); inner.className = 'cell-inner'; inner.innerText = r[i] || "";
                cell.id = `c-${start+idx}-${i}`;
                if(r[i]) {
                    if(cfg.myKeys.some(k => r[i].includes(k))) cell.style.color = "var(--blue)";
                    else if(cfg.otherKeys.some(k => r[i].includes(k))) cell.style.color = "var(--gray)";
                }
                cell.appendChild(inner); row.appendChild(cell);
            }
            container.appendChild(row);
        });
    }
    renderGrid('grid-morning', morningData, 0); renderGrid('grid-afternoon', afternoonData, 4);

    function playBeep() {
        if (!audioCtx || isAudioMuted) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function stopAudioRemind() { isAudioMuted = true; const btn = document.getElementById('audioBtn'); btn.style.background = "var(--green)"; btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; }

    function refresh() {
        const now = new Date(); const nowS = now.toTimeString().slice(0, 5);
        const h = String(now.getHours()).padStart(2, '0'), m = String(now.getMinutes()).padStart(2, '0'), s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('real-time').innerText = `དུས་ཚོད། ${h}:${m}:${s}`;

        const wk = now.getDay(), realWk = (wk === 0) ? 7 : wk; 
        const msgEl = document.getElementById('msg');

        slots.forEach((t, i) => {
            for(let j=1; j<=7; j++) {
                const cell = document.getElementById(`c-${i}-${j}`);
                if (cell) {
                    cell.classList.remove('col-today', 'active-cell');
                    if (j === realWk) {
                        cell.classList.add('col-today');
                        if (nowS >= t.s && nowS < t.e) {
                            cell.classList.add('active-cell');
                        }
                    }
                }
            }
            if (realWk < 6) {
                [40, 5].forEach(offset => {
                    const triggerTime = timeAdd(t.s, -offset);
                    const key = `slot-${i}-${offset}`;
                    if (nowS === triggerTime && currentReminderKey !== key) {
                        currentReminderKey = key; isAudioMuted = false; reminderStartTime = Date.now();
                        const btn = document.getElementById('audioBtn'); btn.style.background = "var(--orange)"; btn.innerText = "🔔 སྒྲ་མཚམས་འཇོག་པ།";
                    }
                });
            }
        });

        if (currentReminderKey !== "" && !isAudioMuted) {
            const elapsed = Math.floor((Date.now() - reminderStartTime) / 60000);
            if (elapsed < 6) { if (elapsed % 2 === 0 && now.getMilliseconds() < 1000 && now.getSeconds() % 2 === 0) playBeep(); } else { stopAudioRemind(); }
        }

        if (realWk >= 6) { 
            msgEl.innerText = (realWk === 6) ? "དེ་རིང་གཟའ་སྤེན་པ་རེད། དགེན་ལགས་གཟའ་མཇུག་སྤྲོ།" : "དེ་རིང་གཟའ་ཉི་མ་རེད། དགེན་ལགས་གཟའ་མཇུག་སྤྲོ།"; 
        } else {
            const full = [...morningData, ...afternoonData];
            let currentSlotIndex = -1; slots.forEach((t, i) => { if (nowS >= t.s && nowS < t.e) currentSlotIndex = i; });
            if (currentSlotIndex !== -1) {
                const curTask = full[currentSlotIndex][realWk];
                msgEl.innerText = curTask ? `དེ་རིང་སློབ་ཚན་ཡོད།: ${curTask}` : "སློབ་ཚན་མི་འདུག";
            } else { msgEl.innerText = "སློབ་ཚན་མི་འདུག"; }
        }

        document.querySelectorAll('.cell').forEach(c => {
            const inner = c.querySelector('.cell-inner');
            if(inner && inner.innerText !== "") {
                inner.style.transform = "scale(1)";
                const ratio = (c.offsetWidth - 6) / inner.offsetWidth;
                if(ratio < 1) inner.style.transform = `scale(${ratio})`;
            }
        });
    }

    function activateAudio() { 
        if (currentReminderKey !== "" && !isAudioMuted) { stopAudioRemind(); return; }
        const btn = document.getElementById('audioBtn');
        try { const AudioContext = window.AudioContext || window.webkitAudioContext; audioCtx = new AudioContext(); playBeep(); btn.style.background = "var(--green)"; btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; } catch (e) { btn.innerText = "ERROR"; }
    }
    setInterval(refresh, 1000); refresh(); window.addEventListener('resize', refresh);
</script>
</body>
</html>
