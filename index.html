<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face {
            font-family: 'TibetWildYak';
            src: url('TibetWildYak.ttf') format('truetype');
        }

        :root {
            --bg: #f8f9fa;
            --accent: #c0392b;
            --blue: #007aff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            height: 100%; width: 100%; 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'TibetWildYak', -apple-system, sans-serif;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            /* 彻底移除底部安全区域限制，强制铺满 */
            padding: env(safe-area-inset-top) 6px 0px 6px;
            background: linear-gradient(rgba(248,249,250,0.95), rgba(248,249,250,0.95)), url('apple-touch-icon.png') no-repeat center;
            background-size: contain;
        }

        header { flex: 0 0 auto; padding: 0px 0 1px 0; }
        .t-name { font-size: clamp(14px, 3.2vh, 18px); font-weight: bold; color: var(--accent); text-align: center; }

        .btn { 
            flex: 0 0 auto; width: 100%; height: clamp(24px, 3.8vh, 34px); 
            background: #27ae60; color: #fff; border: none; border-radius: 6px; 
            font-size: clamp(12px, 1.8vh, 15px); margin-bottom: 2px; font-family: 'TibetWildYak';
        }

        #status-box { 
            flex: 0 0 auto; background: #fff; border-radius: 6px; border: 1px solid #eee; 
            padding: 1px; text-align: center; margin-bottom: 2px;
        }
        #clock { font-size: 8px; color: #8e8e93; font-family: monospace; line-height: 1; }
        #msg { 
            font-size: clamp(11px, 2vh, 16px); 
            font-weight: bold; color: var(--accent); 
            border: 1.5px solid var(--accent); border-top: 3px solid var(--accent);
            border-radius: 5px; padding: 1px; min-height: 1.2em;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-height: 0;
            padding-bottom: 2px; /* 留出极小的物理边缘 */
        }

        .section-group {
            flex: 1; 
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 6px;
            border: 1.5px solid var(--accent);
            border-top: 3px solid var(--accent);
            overflow: hidden;
            min-height: 0;
        }

        .grid-container { flex: 1; display: flex; flex-direction: column; min-height: 0; width: 100%; table-layout: fixed; }
        .grid-row { display: flex; flex: 1; border-bottom: 1px solid #f2f2f2; min-height: 0; width: 100%; }
        .grid-row:last-child { border-bottom: none; }
        .grid-header { background: #fafafa; flex: 0 0 auto; height: clamp(18px, 2.8vh, 28px); border-bottom: 1px solid #eee; }

        .cell { 
            flex: 1; 
            width: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-right: 1px solid #f2f2f2; 
            font-size: clamp(8px, 1.3vh, 12px);
            text-align: center; 
            line-height: 1.2; 
            padding: 0px 1px;
            overflow: hidden; 
        }
        
        .cell-inner {
            white-space: nowrap;
            display: inline-block;
            transform-origin: center;
        }

        .grid-header .cell {
            font-size: clamp(7px, 1.2vh, 11px);
            color: var(--blue);
        }

        .cell:last-child { border-right: none; }
        .num-col { flex: 0 0 14%; color: #8b0000; font-weight: bold; background: #fdfdfd; flex-direction: column; width: 14% !important; }

        .col-today { background-color: #fff5f5 !important; }
        .active-cell { background-color: var(--accent) !important; color: white !important; font-weight: bold; }

        @media (orientation: landscape) {
            .wrapper { padding: env(safe-area-inset-top) 40px 5px 40px; }
            .content-area { gap: 4px; }
            .cell { font-size: clamp(10px, 4.2vh, 16px); padding: 3px 1px; line-height: 1.5; }
            .grid-header .cell { font-size: clamp(9px, 3.8vh, 15px); }
            .t-name { font-size: clamp(14px, 5vh, 20px); }
            .btn { height: clamp(24px, 6vh, 36px); font-size: clamp(12px, 3vh, 16px); }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header><div class="t-name">དགེན་ཁམས་པ་ཚང་།</div></header>
    <button class="btn" id="audioBtn" onclick="activateAudio()">སྒྲ་གཏོང་ལམ་བཟོ་བ།</button>
    <div id="status-box">
        <div id="clock">00:00:00</div>
        <div id="msg">...</div>
    </div>

    <div class="content-area">
        <div class="section-group">
            <div class="grid-container">
                <div class="grid-row grid-header">
                    <div class="cell num-col" style="font-size:0.7em; color: #8b0000;"><span class="cell-inner">ཚོགས་ཐེངས།</span></div>
                    <div class="cell"><span class="cell-inner">ཟླ་བ།</span></div>
                    <div class="cell"><span class="cell-inner">མིག་དམར།</span></div>
                    <div class="cell"><span class="cell-inner">ལྷག་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཕུར་བུ།</span></div>
                    <div class="cell"><span class="cell-inner">པ་སངས་།</span></div>
                    <div class="cell"><span class="cell-inner">སྤེན་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཉི་མ།</span></div>
                </div>
                <div id="grid-morning" style="display:contents"></div>
            </div>
        </div>
        <div class="section-group">
            <div class="grid-container">
                <div class="grid-row grid-header">
                    <div class="cell num-col" style="font-size:0.7em; color: #8b0000;"><span class="cell-inner">ཚོགས་ཐེངས།</span></div>
                    <div class="cell"><span class="cell-inner">ཟླ་བ།</span></div>
                    <div class="cell"><span class="cell-inner">མིག་དམར།</span></div>
                    <div class="cell"><span class="cell-inner">ལྷག་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཕུར་བུ།</span></div>
                    <div class="cell"><span class="cell-inner">པ་སངས་།</span></div>
                    <div class="cell"><span class="cell-inner">སྤེན་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཉི་མ།</span></div>
                </div>
                <div id="grid-afternoon" style="display:contents"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const cfg = { mS: "09:30", aS: "15:00", dur: 40, myKeys: ["རི་མོ།", "གླུ་གཞས།", "ཡིག་གཟུགས།"] };
    const morningData = [["༡","","","","","","",""],["༢","","","","","","",""],["༣","རི་མོ།༡","","","རི་མོ།༢","","",""],["༤","ངལ་རྩོལ།","","","","ཡིག་གཟུགས།","",""]];
    const afternoonData = [["༡","","རི་མོ།༢","","","","",""],["༢","","","གླུ་གཞས།","","སློབ་གསོ།","",""],["༣","","རི་མོ།༡","","","","",""]];

    let audioCtx = null;
    let isAudioMuted = false;
    let currentReminderKey = ""; 
    let reminderCount = 0;
    let reminderStartTime = 0;

    function timeAdd(t, m) { 
        let [h, min] = t.split(':').map(Number); 
        let d = new Date(); d.setHours(h, min + m); 
        return d.toTimeString().slice(0, 5); 
    }

    const slots = [];
    let cm = cfg.mS; for(let i=0; i<4; i++) { let s = cm, e = timeAdd(s, cfg.dur); slots.push({s, e}); cm = timeAdd(e, i===1 ? 20 : 15); }
    let ca = cfg.aS; for(let i=0; i<3; i++) { let s = ca, e = timeAdd(s, cfg.dur); slots.push({s, e}); ca = timeAdd(e, 15); }

    function renderGrid(id, data, start) {
        const container = document.getElementById(id);
        data.forEach((r, idx) => {
            let row = document.createElement('div');
            row.className = 'grid-row';
            row.innerHTML = `<div class="cell num-col"><span class="cell-inner">${r[0]}</span></div>`;
            for(let i=1; i<=7; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                let inner = document.createElement('span');
                inner.className = 'cell-inner';
                inner.innerText = r[i] || "";
                cell.id = `c-${start+idx}-${i}`;
                if(r[i] && cfg.myKeys.some(k => r[i].includes(k))) cell.style.color = "var(--accent)";
                cell.appendChild(inner);
                row.appendChild(cell);
            }
            container.appendChild(row);
        });
    }

    renderGrid('grid-morning', morningData, 0);
    renderGrid('grid-afternoon', afternoonData, 4);

    function playBeep() {
        if (!audioCtx || isAudioMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function stopAudioRemind() {
        isAudioMuted = true;
        const btn = document.getElementById('audioBtn');
        btn.style.background = "#27ae60";
        btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།";
    }

    function refresh() {
        const now = new Date();
        const nowS = now.toTimeString().slice(0, 5);
        const wk = now.getDay(); 
        const realWk = (wk === 0) ? 7 : wk; 
        document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', {hour12:false});
        const msgEl = document.getElementById('msg');
        
        let activeClassFound = false;
        slots.forEach((t, i) => {
            for(let j=1; j<=7; j++) {
                const cell = document.getElementById(`c-${i}-${j}`);
                if (cell) {
                    cell.classList.remove('col-today', 'active-cell');
                    if (j === realWk) {
                        cell.classList.add('col-today');
                        if (nowS >= t.s && nowS < t.e) {
                            cell.classList.add('active-cell');
                            activeClassFound = true;
                        }
                    }
                }
            }

            if (realWk < 6) {
                const checkTimes = [40, 5];
                checkTimes.forEach(offset => {
                    const triggerTime = timeAdd(t.s, -offset);
                    const key = `slot-${i}-${offset}`;
                    if (nowS === triggerTime) {
                        if (currentReminderKey !== key) {
                            currentReminderKey = key;
                            isAudioMuted = false;
                            reminderCount = 0;
                            reminderStartTime = Date.now();
                            const btn = document.getElementById('audioBtn');
                            btn.style.background = "#e67e22";
                            btn.innerText = "🔔 སྒྲ་མཚམས་འཇོག་པ།";
                            btn.disabled = false;
                        }
                    }
                });
            }
        });

        if (currentReminderKey !== "" && !isAudioMuted) {
            const elapsed = Math.floor((Date.now() - reminderStartTime) / 60000);
            const cycleIndex = Math.floor(elapsed / 2);
            const isPlayingPhase = elapsed % 2 === 0;

            if (cycleIndex < 3) {
                if (isPlayingPhase) {
                    if (now.getMilliseconds() < 1000 && now.getSeconds() % 2 === 0) playBeep(); 
                }
            } else {
                stopAudioRemind();
            }
        }

        if (realWk >= 6) {
            msgEl.innerText = (realWk === 6) ? "དེ་རིང་གཟའ་སྤེན་པ་རེད། དགེན་ལགས་གཟའ་མཇུག་སྤྲོ།" : "དེ་རིང་གཟའ་ཉི་མ་རེད། དགེན་ལགས་གཟའ་མཇུག་སྤྲོ།";
        } else {
            const full = [...morningData, ...afternoonData];
            let currentSlotIndex = -1;
            let lastSlotIndex = -1;

            slots.forEach((t, i) => {
                if (nowS >= t.s && nowS < t.e) currentSlotIndex = i;
                if (full[i][realWk]) lastSlotIndex = i;
            });

            if (currentSlotIndex !== -1) {
                const curTask = full[currentSlotIndex][realWk];
                if (curTask) {
                    const period = currentSlotIndex < 4 ? "སྔ་དྲོ།" : "ཕྱི་དྲོ།";
                    msgEl.innerText = `དེ་རིང་${period}སློབ་ཚན་ཡོད།: ${curTask}`;
                } else {
                    msgEl.innerText = "";
                }
            } else {
                const lastEndTime = lastSlotIndex !== -1 ? slots[lastSlotIndex].e : "00:00";
                if (nowS > lastEndTime && lastSlotIndex !== -1) {
                    msgEl.innerText = "དེ་རིང་གི་སློབ་ཚན་མཇུག་སྒྲིལ་ཟིན།";
                } else {
                    msgEl.innerText = "";
                }
            }
        }
        
        document.querySelectorAll('.cell').forEach(c => {
            const inner = c.querySelector('.cell-inner');
            if(inner && inner.innerText !== "") {
                inner.style.transform = "scale(1)";
                const ratio = (c.offsetWidth - 4) / inner.offsetWidth;
                if(ratio < 1) inner.style.transform = `scale(${ratio})`;
            }
        });
    }

    function activateAudio() { 
        if (currentReminderKey !== "" && !isAudioMuted) {
            stopAudioRemind();
            return;
        }
        const btn = document.getElementById('audioBtn');
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            playBeep(); 
            btn.style.background = "#27ae60"; 
            btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; 
        } catch (e) { 
            btn.style.background = "#c0392b";
            btn.innerText = "སྒྲ་གཏོང་ལམ་བོ་མ་ཐུབ།"; 
        }
    }

    setInterval(refresh, 1000); refresh();
</script>
</body>
</html>
