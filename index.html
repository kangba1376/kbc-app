<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face {
            font-family: 'TibetWildYak';
            src: url('TibetWildYak.ttf') format('truetype');
        }

        :root {
            --bg: #f8f9fa;
            --accent: #c0392b;
            --blue: #007aff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            height: 100%; width: 100%; 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'TibetWildYak', -apple-system, sans-serif;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: env(safe-area-inset-top) 8px 30px 8px;
            background: linear-gradient(rgba(248,249,250,0.95), rgba(248,249,250,0.95)), url('apple-touch-icon.png') no-repeat center;
            background-size: contain;
        }

        header { flex: 0 0 auto; padding: 2px 0; }
        .t-name { font-size: clamp(16px, 3.8vh, 22px); font-weight: bold; color: var(--accent); text-align: center; }

        .btn { 
            flex: 0 0 auto; width: 100%; height: clamp(28px, 4.5vh, 40px); 
            background: #27ae60; color: #fff; border: none; border-radius: 8px; 
            font-size: clamp(14px, 2.2vh, 18px); margin-bottom: 4px; font-family: 'TibetWildYak';
        }

        #status-box { 
            flex: 0 0 auto; background: #fff; border-radius: 8px; border: 1px solid #eee; 
            padding: 2px; text-align: center; margin-bottom: 4px;
        }
        #clock { font-size: 10px; color: #8e8e93; font-family: monospace; }
        #msg { 
            font-size: clamp(12px, 2.2vh, 18px); 
            font-weight: bold; color: var(--accent); 
            border: 1.5px solid var(--accent); border-top: 3.5px solid var(--accent);
            border-radius: 6px; padding: 2px;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }

        .section-group {
            flex: 1; 
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 8px;
            border: 1.5px solid var(--accent);
            border-top: 3.5px solid var(--accent);
            overflow: hidden;
            min-height: 0;
        }

        .grid-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .grid-row { display: flex; flex: 1; border-bottom: 1px solid #f2f2f2; min-height: 0; }
        .grid-row:last-child { border-bottom: none; }
        .grid-header { background: #fafafa; flex: 0 0 auto; height: clamp(22px, 3.2vh, 34px); border-bottom: 1px solid #eee; }

        .cell { 
            flex: 1; display: flex; align-items: center; justify-content: center;
            border-right: 1px solid #f2f2f2; 
            font-size: clamp(8px, 1.6vh, 15px);
            text-align: center; 
            line-height: 1.6; 
            padding: 2px 1px;
            overflow: visible;
        }
        .cell:last-child { border-right: none; }
        .num-col { flex: 0 0 14%; color: #8b0000; font-weight: bold; background: #fdfdfd; flex-direction: column; }

        .col-today { background-color: #fff5f5 !important; }
        .active-cell { background-color: var(--accent) !important; color: white !important; font-weight: bold; }

        @media (orientation: landscape) {
            .wrapper { padding: env(safe-area-inset-top) 40px 30px 40px; }
            .content-area { gap: 4px; }
            .cell { font-size: clamp(10px, 4.5vh, 18px); padding: 4px 1px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header><div class="t-name">དགེན་ཁམས་པ་ཚང་།</div></header>
    <button class="btn" id="audioBtn" onclick="activateAudio()">སྒྲ་གཏོང་ལམ་བཟོ་བ།</button>
    <div id="status-box">
        <div id="clock">00:00:00</div>
        <div id="msg">...</div>
    </div>

    <div class="content-area">
        <div class="section-group">
            <div class="grid-container">
                <div class="grid-row grid-header">
                    <div class="cell num-col" style="font-size:0.7em">ཚོགས་ཐེངས།</div>
                    <div class="cell">ཟླ་བ།</div><div class="cell">མིག་དམར།</div><div class="cell">ལྷག་པ།</div><div class="cell">ཕུར་བུ།</div><div class="cell">པ་སངས་།</div><div class="cell">སྤེན་པ།</div><div class="cell">ཉི་མ།</div>
                </div>
                <div id="grid-morning" style="display:contents"></div>
            </div>
        </div>
        <div class="section-group">
            <div class="grid-container">
                <div class="grid-row grid-header">
                    <div class="cell num-col" style="font-size:0.7em">ཚོགས་ཐེངས།</div>
                    <div class="cell">ཟླ་བ།</div><div class="cell">མིག་དམར།</div><div class="cell">ལྷག་པ།</div><div class="cell">ཕུར་བུ།</div><div class="cell">པ་སངས་།</div><div class="cell">སྤེན་པ།</div><div class="cell">ཉི་མ།</div>
                </div>
                <div id="grid-afternoon" style="display:contents"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const cfg = { mS: "09:30", aS: "15:00", dur: 40, myKeys: ["རི་མོ།", "གླུ་གཞས།", "ཡིག་གཟུགས།"] };
    const morningData = [["༡","","","","","","",""],["༢","","","","","","",""],["༣","རི་མོ།༡","","","རི་མོ།༢","","",""],["༤","ངལ་རྩོལ།","","","","ཡིག་གཟུགས།༡༢","",""]];
    const afternoonData = [["༡","","རི་མོ།༢","","","","",""],["༢","","","གླུ་གཞས།༢","","སློབ་གསོ།","",""],["༣","","རི་མོ།༡","","","","",""]];

    function timeAdd(t, m) { 
        let [h, min] = t.split(':').map(Number); 
        let d = new Date(); d.setHours(h, min + m); 
        return d.toTimeString().slice(0, 5); 
    }

    const slots = [];
    let cm = cfg.mS; for(let i=0; i<4; i++) { let s = cm, e = timeAdd(s, cfg.dur); slots.push({s, e}); cm = timeAdd(e, i===1 ? 20 : 15); }
    let ca = cfg.aS; for(let i=0; i<3; i++) { let s = ca, e = timeAdd(s, cfg.dur); slots.push({s, e}); ca = timeAdd(e, 15); }

    function renderGrid(id, data, start) {
        const container = document.getElementById(id);
        data.forEach((r, idx) => {
            let row = document.createElement('div');
            row.className = 'grid-row';
            // 修改点：删除了 <span> 内的时间显示
            row.innerHTML = `<div class="cell num-col">${r[0]}</div>`;
            for(let i=1; i<=7; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = r[i] || "";
                cell.id = `c-${start+idx}-${i}`;
                if(r[i] && cfg.myKeys.some(k => r[i].includes(k))) cell.style.color = "var(--accent)";
                row.appendChild(cell);
            }
            container.appendChild(row);
        });
    }

    renderGrid('grid-morning', morningData, 0);
    renderGrid('grid-afternoon', afternoonData, 4);

    function refresh() {
        const now = new Date();
        const nowS = now.toTimeString().slice(0, 5);
        const wk = now.getDay(); 
        const realWk = (wk === 0) ? 7 : wk; 
        document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', {hour12:false});
        const msgEl = document.getElementById('msg');
        
        slots.forEach((t, i) => {
            for(let j=1; j<=7; j++) {
                const cell = document.getElementById(`c-${i}-${j}`);
                if (cell) {
                    cell.classList.remove('col-today', 'active-cell');
                    if (j === realWk) {
                        cell.classList.add('col-today');
                        if (nowS >= t.s && nowS < t.e) cell.classList.add('active-cell');
                    }
                }
            }
        });

        if (realWk >= 6) {
            msgEl.innerText = (realWk === 6) ? "དེ་རིང་གཟའ་སྤེན་པ་རེད། གཟའ་མཇུག་སྤྲོ།" : "དེ་རིང་གཟའ་ཉིན་མ་རེད། གཟའ་མཇུག་སྤྲོ།";
        } else {
            const full = [...morningData, ...afternoonData];
            let cur = "";
            slots.forEach((t, i) => { if (nowS >= t.s && nowS < t.e) cur = full[i][realWk] || "ནང་སྦྱོང་།"; });
            msgEl.innerText = cur ? `ད་ལྟ།: ${cur}` : "སློབ་ཚན་མེད།";
        }
    }
    setInterval(refresh, 1000); refresh();

    function activateAudio() { 
        const btn = document.getElementById('audioBtn');
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.15);
            
            // 修改点：激活后背景色变为红色
            btn.style.background = "#c0392b"; 
            btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོ་ཟིན།"; 
            btn.disabled = true;
        } catch (e) { btn.innerText = "激活失败"; }
    }
</script>
</body>
</html>
