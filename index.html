<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face {
            font-family: 'TibetWildYak';
            src: url('TibetWildYak.ttf') format('truetype');
        }

        :root {
            --bg: #f8f9fa;
            --accent: #c0392b;
            --blue: #007aff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            height: 100%; width: 100%; 
            overflow: hidden; /* 严禁滚动 */
            background: var(--bg);
            font-family: 'TibetWildYak', -apple-system, sans-serif;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: env(safe-area-inset-top) 12px 30px 12px;
            background: linear-gradient(rgba(248,249,250,0.92), rgba(248,249,250,0.92)), url('apple-touch-icon.png') no-repeat center;
            background-size: 50%;
        }

        header { flex: 0 0 auto; padding: 2px 0; text-align: center; }
        .t-name { font-size: clamp(18px, 4vh, 24px); font-weight: bold; color: var(--accent); }

        .btn { 
            flex: 0 0 auto; width: 100%; height: clamp(30px, 5vh, 44px); 
            background: #27ae60; color: #fff; border: none; border-radius: 10px; 
            font-size: clamp(14px, 2.5vh, 18px); margin: 2px 0; font-family: 'TibetWildYak';
            cursor: pointer;
        }

        #status-box { 
            flex: 0 0 auto; background: #fff; border-radius: 12px; border: 1px solid #eee; 
            padding: 4px; text-align: center; margin-bottom: 4px;
        }
        #clock { font-size: 12px; color: #8e8e93; font-family: monospace; }
        
        #msg { 
            font-size: clamp(14px, 2.5vh, 18px); 
            font-weight: bold; 
            color: var(--accent); 
            border: 2px solid var(--accent);
            border-top: 4px solid var(--accent);
            border-radius: 8px;
            padding: 4px;
            background: #fff;
        }

        .content-area {
            flex: 1; /* 占据剩余所有高度 */
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0; /* 允许内部元素收缩 */
        }

        .section-group {
            flex: 1; /* 上下午表格平分剩余高度 */
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            border: 2px solid var(--accent);
            border-top: 4px solid var(--accent);
            overflow: hidden;
            min-height: 0;
        }

        .section-title { 
            flex: 0 0 auto; padding: 1px 0; 
            font-size: clamp(12px, 2vh, 16px); 
            color: var(--blue); background: rgba(0,122,255,0.03); 
            font-weight: bold; text-align: center;
        }

        .table-card { flex: 1; display: flex; min-height: 0; }
        table { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th, td { 
            border: 1px solid #f2f2f2; text-align: center; 
            font-size: clamp(9px, 1.8vh, 15px); 
            padding: 0;
            line-height: 1.1;
        }
        th { background: #fafafa; color: #8e8e93; font-size: clamp(8px, 1.2vh, 11px); }
        
        .num-col { color: #8b0000; font-weight: bold; background: #fdfdfd; width: 14%; }
        .col-today { background-color: #fff5f5 !important; }
        .active-cell { background-color: var(--accent) !important; color: white !important; font-weight: bold; }

        @media (orientation: landscape) {
            .wrapper { padding: env(safe-area-inset-top) 5vw 30px 5vw; }
            .content-area { gap: 4px; }
            th, td { font-size: clamp(10px, 4vh, 18px); }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header><div class="t-name">དགེན་ཁམས་པ་ཚང་།</div></header>
    <button class="btn" id="audioBtn" onclick="activateAudio()">སྒྲ་གཏོང་ལམ་བཟོ་བ།</button>
    <div id="status-box">
        <div id="clock">00:00:00</div>
        <div id="msg">སྒུག་བཞིན་པ།...</div>
    </div>

    <div class="content-area">
        <div class="section-group">
            <div class="section-title">སྔ་དྲོ།</div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th class="num-col">ཚོགས་ཐེངས།</th>
                            <th>ཟླ་བ།</th><th>མིག་དམར།</th><th>ལྷག་པ།</th><th>ཕུར་བུ།</th><th>པ་སངས་།</th><th>སྤེན་པ།</th><th>ཉི་མ།</th>
                        </tr>
                    </thead>
                    <tbody id="tb-morning"></tbody>
                </table>
            </div>
        </div>
        <div class="section-group">
            <div class="section-title">ཕྱི་དྲོ།</div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th class="num-col">ཚོགས་ཐེངས།</th>
                            <th>ཟླ་བ།</th><th>མིག་དམར།</th><th>ལྷག་པ།</th><th>ཕུར་བུ།</th><th>པ་སངས་།</th><th>སྤེན་པ།</th><th>ཉི་མ།</th>
                        </tr>
                    </thead>
                    <tbody id="tb-afternoon"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const cfg = { mS: "09:30", aS: "15:00", dur: 40, myKeys: ["རི་མོ།", "གླུ་གཞས།", "ཡིག་གཟུགས།"] };
    const morningData = [["༡","","","","","","",""],["༢","","","","","","",""],["༣","རི་མོ།༡","","","རི་མོ།༢","","",""],["༤","ངལ་རྩོལ།","","","","ཡིག་གཟུགས།༡༢","",""]];
    const afternoonData = [["༡","","རི་མོ།༢","","","","",""],["༢","","","གླུ་གཞས།༢","","སློབ་གསོ།","",""],["༣","","རི་མོ།༡","","","","",""]];

    function timeAdd(t, m) { 
        let [h, min] = t.split(':').map(Number); 
        let d = new Date(); d.setHours(h, min + m); 
        return d.toTimeString().slice(0, 5); 
    }

    const slots = [];
    let cm = cfg.mS; for(let i=0; i<4; i++) { let s = cm, e = timeAdd(s, cfg.dur); slots.push({s, e}); cm = timeAdd(e, i===1 ? 20 : 15); }
    let ca = cfg.aS; for(let i=0; i<3; i++) { let s = ca, e = timeAdd(s, cfg.dur); slots.push({s, e}); ca = timeAdd(e, 15); }

    function renderTable(id, data, start) {
        const body = document.getElementById(id);
        data.forEach((r, idx) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td class="num-col">${r[0]}<br><span style="font-size:0.7em;opacity:0.6">${slots[start+idx].s}</span></td>`;
            for(let i=1; i<=7; i++) {
                let td = document.createElement('td');
                td.innerText = r[i] || "";
                td.id = `c-${start+idx}-${i}`;
                if(r[i] && cfg.myKeys.some(k => r[i].includes(k))) {
                    td.style.color = "var(--accent)";
                }
                tr.appendChild(td);
            }
            body.appendChild(tr);
        });
    }

    renderTable('tb-morning', morningData, 0);
    renderTable('tb-afternoon', afternoonData, 4);

    function refresh() {
        const now = new Date();
        const nowS = now.toTimeString().slice(0, 5);
        const wk = now.getDay(); 
        const realWk = (wk === 0) ? 7 : wk; 
        document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', {hour12:false});
        const msgEl = document.getElementById('msg');
        
        slots.forEach((t, i) => {
            for(let j=1; j<=7; j++) {
                const cell = document.getElementById(`c-${i}-${j}`);
                if (cell) {
                    cell.classList.remove('col-today', 'active-cell');
                    if (j === realWk) {
                        cell.classList.add('col-today');
                        if (nowS >= t.s && nowS < t.e) cell.classList.add('active-cell');
                    }
                }
            }
        });

        if (realWk >= 6) {
            msgEl.innerText = (realWk === 6) ? "དེ་རིང་གཟའ་སྤེན་པ་རེད། གཟའ་མཇུག་སྤྲོ།" : "དེ་རིང་གཟའ་ཉི་མ་རེད། གཟའ་མཇུག་སྤྲོ།";
        } else {
            const full = [...morningData, ...afternoonData];
            let currentCourse = "";
            slots.forEach((t, i) => {
                if (nowS >= t.s && nowS < t.e) currentCourse = full[i][realWk] || "ནང་སྦྱོང་།";
            });
            msgEl.innerText = currentCourse ? `ད་ལྟ།: ${currentCourse}` : "ད་ལྟ་སློབ་ཚན་མེད།";
        }
    }
    setInterval(refresh, 1000); 
    refresh();

    function activateAudio() { 
        const btn = document.getElementById('audioBtn');
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
            btn.style.background = "#95a5a6";
            btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོ་ཟིན།";
            btn.disabled = true;
        } catch (e) {
            btn.innerText = "激活失败";
        }
    }
</script>
</body>
</html>
