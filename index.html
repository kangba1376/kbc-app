<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="apple-touch-icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="སློབ་ཚན།">
    
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face { font-family: 'danzeng'; src: url('danzeng.ttf') format('truetype'); }
        /* Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #f8f9fa;
            --deep-blue: #004080;
            --tibetan-red: #B22222;
            --blue: #007bff;
            --green: #28a745;
            --orange: #e67e22;
        }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'danzeng', sans-serif;
            background: var(--bg);
            user-select: none;
            -webkit-user-select: none;
        }
        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Top Bar */
        .top-bar {
            flex: 0 0 50px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Space out left/right */
            padding: 0 10px;
            background: transparent;
            position: relative; /* For absolute centering */
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--deep-blue);
            white-space: nowrap;
            /* 绝对居中 */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        #weekday-display {
            font-size: 1.2rem; /* Revert back to 1.2rem */
            color: var(--blue);
            font-weight: bold;
            z-index: 2;
        }
        
        #real-time {
            font-size: 1.2rem; /* Same as weekday */
            color: var(--blue);
            font-weight: bold;
            z-index: 2;
        }

        /* Status Bar */
.status-bar {
    flex: 0 0 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: bold;
    color: var(--tibetan-red);
    background: rgba(255,255,255,0.7);
    margin: 0 10px 5px 10px;
    /* 外边框：藏红色，默认 2px */
    border: 2px solid var(--tibetan-red);
    /* 顶部边框：特粗 7px (5px + 2px) */
    border-top: 7px solid var(--tibetan-red);
    border-radius: 8px;
}

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 10px 10px 10px;
            gap: 5px;
            overflow: hidden;
        }

        .grid-container {
    width: 100%;
    /* 外边框：藏红色，默认 2px */
    border: 2px solid var(--tibetan-red);
    /* 顶部边框：特粗 7px (5px + 2px) */
    border-top: 7px solid var(--tibetan-red);
    border-radius: 8px;
    overflow: hidden;
    background: rgba(255,255,255,0.8);
    display: flex;
    flex-direction: column;
}
        /* 4:3 Ratio Implementation via Flex Grow */
        #grid-morning { flex: 4; }
        #grid-afternoon { flex: 3; }

        /* Grid */
        .grid-header, .grid-row {
            display: flex;
            width: 100%;
        }
        .grid-header { 
            flex: 0 0 32px; 
            background: rgba(255,255,255,0.6); 
            font-size: 1.4rem; 
            font-weight: bold; color: #008080;
            /* Header Bottom Border: Deep Blue */
            border-bottom: 1px solid var(--deep-blue);
        }
        .grid-row { 
            flex: 1; 
            min-height: 0;
            /* Row Bottom Border (except last): Deep Blue */
            border-bottom: 1px solid var(--deep-blue); 
        }
        .grid-row:last-child {
            border-bottom: none;
        }

        .cell {
            flex: 1; 
            /* Cell Right Border: Deep Blue */
            border-right: 1px solid var(--deep-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.6rem; 
            padding: 2px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }
        .cell:last-child {
            border-right: none;
        }
        /* Cell Content */
.cell-inner {
    display: inline-block;
    white-space: nowrap;
    transform-origin: center; /* Scale from center */
    font-size: 100%; /* Ensure base size */
    line-height: 1.5; /* 增加行高，给上加字留空间 */
    padding-top: 4px; /* 稍微给点顶部内边距 */
}
        .num-col {
            flex: 0 0 45px; 
            background: #f8f9fa;
            color: var(--blue);
            font-weight: bold;
            font-size: 1.4rem;
            /* Num Col Right Border: Deep Blue */
            border-right: 2px solid var(--deep-blue); /* Thicker separator */
        }
        .col-today-header { background-color: rgba(255, 250, 250, 0.8); color: var(--tibetan-red); }
        .active-cell { background-color: #ADD8E6 !important; color: #000 !important; }
        .active-cell .cell-inner { color: #000 !important; }
        
        /* Cleaned CSS */
        @media (orientation: portrait) {
            .content-area { padding-bottom: 20px; }
        }
        .diag-svg { position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none; }

        .c-red { color: #f00 !important; font-weight: bold; }
        .c-blue { color: #00f !important; font-weight: bold; }
        .c-navy { color: #000080 !important; font-weight: bold; }
        .c-gray { color: #808080 !important; font-weight: bold; }
    </style>
</head>
<body>
<div id="app">
    <!-- Top Bar -->
    <div class="top-bar">
        <div id="weekday-display">གཟའ་...</div>
        <div class="title">ཁམས་པ་ཚང་།</div>
        <div id="real-time">...</div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="status-text">...</div>

    <!-- Content Area -->
    <div class="content-area">
        <div id="grid-morning" class="grid-container"></div>
        <div id="grid-afternoon" class="grid-container"></div>
    </div>
</div>

<script>
/* REMOVED Audio variables */

    const toM = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

    const slots = [{s: "09:30", e: "10:10"}, {s: "10:25", e: "11:05"}, {s: "11:30", e: "12:10"}, {s: "12:25", e: "13:05"}, {s: "15:00", e: "15:40"}, {s: "15:55", e: "16:35"}, {s: "16:50", e: "17:30"}];
    // Clean Data Arrays
    const mData = [
        ["༡","","","","",""],
        ["༢","","","","",""],
        ["༣","རི་མོ།༢","","","རི་མོ།༢",""],
        ["༤","ངལ་རྩོལ།","","","","ཡིགཟུགས།"]
    ];
    const aData = [
        ["༡","","རི་མོ།༢","","",""],
        ["༢","","","གླུ་གཞས།","","སློབ་གསོ།"],
        ["༣","","རི་མོ།༡","","",""]
    ];

    function getLessonClass(name) {
        if (!name) return "";
        if (name.includes("རི་མོ།")) return "c-red";
        if (name.includes("གླུ་གཞས།")) return "c-blue";
        if (name.includes("ཡིགཟུགས།")) return "c-navy";
        return "c-gray";
    }

    const days = ["ཟླ་བ།","མིག་དམར།","ལྷག་པ།","ཕུར་བུ།","པ་སངས་།","སྤེན་པ།","ཉི་མ།"];

    // Color Logic for Diagonal Header
    // 上面一半 (Triangle Top-Left) -> Color of Weekday Header text? No, user said "color of weekday name".
    // Weekday names are usually blue or red? 
    // Wait, the user said: "上面一半改成后面的星期名字的颜色一样铺满"
    // The weekday names (Mon, Tue...) text color is defined in CSS .grid-header.
    // In CSS: .grid-header { ... color: #008080; ... } Wait, that was old.
    // In refresh(): cells[dayIdx].style.color = 'var(--tibetan-red)'; if active.
    // Default color for header cells? Not explicitly set, inherits or black/gray.
    // But user might mean the BACKGROUND color of the header?
    // "星期名字的颜色" usually means the text color.
    // Let's assume the user wants a specific background color for the top triangle.
    // And "下面一般的根1234 123 颜色一样铺满" -> The number column background color.
    // .num-col background is #f8f9fa.
    
    // User Input: "上面一半改成后面的星期名字的颜色一样铺满"
    // Let's look at the header cells again. They have `background: rgba(255,255,255,0.6)`.
    // So the top triangle should be `rgba(255,255,255,0.6)`.
    
    // "下面一般的根1234 123 颜色一样铺满"
    // The numbers 1,2,3,4 are in .num-col.
    // .num-col background is #f8f9fa.
    // So the bottom triangle should be `#f8f9fa`.
    
    // Gradient:
    // Bottom-Left (Start) -> Top-Right (End).
    // Bottom-Left Triangle is the "Lower" half?
    // Wait, SVG line is `x1="0" y1="100" x2="100" y2="0"`. This is Bottom-Left to Top-Right diagonal.
    // This divides the square into:
    // 1. Top-Left Triangle (Upper)
    // 2. Bottom-Right Triangle (Lower) -> Wait.
    // 0,100 is Bottom-Left. 100,0 is Top-Right.
    // The line connects them.
    // So we have a triangle above the line (Top-Left) and a triangle below the line (Bottom-Right).
    
    // User said: "左上角第一个格子... 上面一半... 下面一半..."
    // "上面一半" (Top-Left Triangle) -> "后面的星期名字的颜色一样铺满" -> Header Background (`rgba(255,255,255,0.6)`).
    // "下面一半" (Bottom-Right Triangle) -> "根1234 123 颜色一样铺满" -> Number Column Background (`#f8f9fa`).
    
    // CSS Linear Gradient for Top-Left to Bottom-Right split:
    // `linear-gradient(to bottom right, TopColor 50%, BottomColor 50%)`
    // Top-Left is the start. Bottom-Right is the end.
    // So `to bottom right` starts at Top-Left.
    // 0% -> 50%: Top Color.
    // 50% -> 100%: Bottom Color.
    
    // Top Color: `rgba(255,255,255,0.6)` (Header BG)
    // Bottom Color: `#f8f9fa` (Num Col BG)
    
    // Let's refine the SVG line to match perfectly.
    // If gradient is `to bottom right`, the line should be `x1="0" y1="0" x2="100" y2="100"`?
    // No, user said "斜着分开".
    // If I use `to bottom right`, the division is from Top-Right to Bottom-Left? No.
    // `to bottom right` goes from TL to BR.
    // The color stop is a line perpendicular to the gradient direction.
    // So a `to bottom right` gradient has a dividing line from Bottom-Left to Top-Right.
    // Perfect! That matches `x1="0" y1="100" x2="100" y2="0"`.
    
    // So:
    // Top-Left Triangle (Upper): Header BG `rgba(255,255,255,0.6)`
    // Bottom-Right Triangle (Lower): Num Col BG `#f8f9fa`
    
    // Wait, "下面一半...根1234...颜色一样".
    // The numbers 1, 2, 3, 4 are in the column *below* this header cell.
    // So the *bottom* part of this header cell should visually connect to the column below.
    // So the Bottom Triangle should be `#f8f9fa`.
    // The Top Triangle connects to the Header Row (Days).
    // The Header Row background is `rgba(255,255,255,0.6)`.
    // So Top Triangle = `rgba(255,255,255,0.6)`.
    
    // Implementation:
    // background: linear-gradient(to bottom right, rgba(255,255,255,0.6) 50%, #f8f9fa 50%);
    // SVG Line: x1="0" y1="100" x2="100" y2="0". (Bottom-Left to Top-Right).
    // This matches.
    
    // And stroke color?
    // The grid lines are `var(--deep-blue)`.
    // So the diagonal line should be `var(--deep-blue)`.
    
    function render(id, data, startIdx) {
        const el = document.getElementById(id);
        let h = `<div class="grid-row grid-header"><div class="cell num-col" style="position:relative"><svg class="diag-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100" stroke="#B22222" stroke-width="1.5"/></svg></div>`;
        // Only Mon-Fri (Index 0-4 of days array)
        days.slice(0, 5).forEach(d => h += `<div class="cell"><span class="cell-inner">${d}</span></div>`);
        el.innerHTML = h + `</div>` + data.map((r, i) => 
            `<div class="grid-row"><div class="cell num-col"><span class="cell-inner">${r[0]}</span></div>` + 
            r.slice(1).map((c, j) => `<div class="cell ${getLessonClass(c)}" id="c-${startIdx + i}-${j + 1}"><span class="cell-inner">${c}</span></div>`).join('') + 
            `</div>`
        ).join('');
    }
    render('grid-morning', mData, 0); render('grid-afternoon', aData, 4);

    function doAutoScale() {
        const container = document.querySelector('.content-area');
        const totalH = container.clientHeight;
        const availableH = totalH - 4; // gap
        
        // 4:3 Ratio
        const morningH = (availableH * 4) / 7;
        const afternoonH = (availableH * 3) / 7;
        
        document.getElementById('grid-morning').style.height = `${morningH}px`;
        document.getElementById('grid-afternoon').style.height = `${afternoonH}px`;
        
        // Auto Scale Font & Content Fit (Unified)
        const cellH = morningH / 5;
        const baseSize = Math.min(window.innerWidth / 16, cellH * 0.5); 
        document.body.style.fontSize = `${baseSize}px`;
        
        // Uniform Scale based on Tuesday
        let targetScale = 1.0;
        const headerRow = document.querySelector('.grid-header');
        if (headerRow) {
            const cells = headerRow.querySelectorAll('.cell');
            if (cells[2]) { // Tue
                const span = cells[2].querySelector('.cell-inner');
                if (span) {
                    span.style.transform = 'none';
                    span.style.display = 'inline-block';
                    const pW = span.parentElement.clientWidth - 4;
                    const sW = span.scrollWidth;
                    if (sW > pW && pW > 0) {
                        targetScale = pW / sW;
                    }
                }
            }
        }
        
        const cells = document.querySelectorAll('.cell-inner');
        cells.forEach(span => {
            span.style.transform = 'none';
            span.style.display = 'inline-block';
            
            const parent = span.parentElement;
            const parentW = parent.clientWidth - 4;
            const spanW = span.scrollWidth;
            const parentH = parent.clientHeight - 4;
            const spanH = span.scrollHeight;
            
            let selfScaleW = 1.0;
            if (spanW > parentW && parentW > 0) selfScaleW = parentW / spanW;
            
            let selfScaleH = 1.0;
            if (spanH > parentH && parentH > 0) selfScaleH = parentH / spanH;
            
            const selfScale = Math.min(selfScaleW, selfScaleH);
            span.style.transform = `scale(${Math.min(selfScale, targetScale) * 0.95})`;
        });
    }

    function refresh() {
        const now = new Date(), currentM = now.getHours() * 60 + now.getMinutes(), day = now.getDay() || 7;
        document.getElementById('real-time').innerText = now.toTimeString().slice(0, 8);
        document.getElementById('weekday-display').innerText = "རེས་གཟའ།" + (days[day-1] || "...");
        
        document.querySelectorAll('.cell').forEach(c => {
            c.style.background = '';
            c.style.color = ''; 
            c.style.fontWeight = '';
        });
        
        if (day >= 1 && day <= 5) {
             const dayIdx = day; 
             document.querySelectorAll('.grid-header').forEach(header => {
                 const cells = header.querySelectorAll('.cell');
                 if (cells[dayIdx]) {
                     cells[dayIdx].style.color = 'var(--tibetan-red)'; 
                     cells[dayIdx].style.fontWeight = 'bold';
                 }
             });
        }

        const myKeys = ["རི་མོ།", "གླུ་གཞས།", "ཡིགཟུགས།"];
        let myLessonIndices = [];
        
        const fullData = [...mData, ...aData];
        fullData.forEach((row, idx) => {
            if (myKeys.some(k => row[day] && row[day].includes(k))) {
                myLessonIndices.push(idx);
            }
        });

        let currentLessonIdx = -1;
        slots.forEach((s, i) => {
            const startM = toM(s.s), endM = toM(s.e);
            if (currentM >= startM && currentM < endM) {
                currentLessonIdx = i;
                if (day >= 1 && day <= 5) {
                    const cellId = `c-${i}-${day}`;
                    const cell = document.getElementById(cellId);
                    if (cell) {
                        cell.style.background = '#ADD8E6'; 
                    }
                }
            }
        });
        
        doAutoScale();

        const statusEl = document.getElementById('status-text');
        if (statusEl) {
             if (day >= 6) { 
                 statusEl.innerText = "དགེན་ལགས་གཟའ་མཇུག་སྤྲོ།";
             } else if (currentLessonIdx !== -1 && myLessonIndices.includes(currentLessonIdx)) { 
                 statusEl.innerText = "ད་ལྟ་སློབ་ཚན་ཚོགས་བཞིན་པ་ཡིན།"; 
             } else if (myLessonIndices.length > 0 && currentM >= toM(slots[myLessonIndices[myLessonIndices.length-1]].e)) { 
                 statusEl.innerText = "དེ་རིང་གི་སློབ་ཚན་མཇུག་སྒྲིལ་ཟིན།"; 
             } else { 
                 statusEl.innerText = "དགེན་ལགས་དེ་རིང་སློབ་ཚན་ཡོད།"; 
             }
        }
    }

    setInterval(refresh, 1000);
    window.addEventListener('resize', doAutoScale);
    document.fonts.ready.then(doAutoScale);
    refresh();
</script>
</body>
</html>
