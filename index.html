<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face {
            font-family: 'TibetWildYak';
            src: url('TibetWildYak.ttf') format('truetype');
        }

        :root {
            --bg: #f8f9fa;
            --accent: #c0392b;
            --blue: #007aff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            height: 100svh; width: 100vw; 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'TibetWildYak', -apple-system, sans-serif;
            position: fixed;
            left: 0; top: 0;
            touch-action: none;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100svh;
            width: 100vw;
            padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom) 8px;
            background: linear-gradient(rgba(248,249,250,0.96), rgba(248,249,250,0.96)), url('apple-touch-icon.png') no-repeat center;
            background-size: 160px auto;
        }

        .top-components { flex: 0 0 auto; margin-bottom: 2px; }
        header { padding: 0; }
        .t-name { font-size: clamp(16px, 2.5vh, 22px); font-weight: bold; color: var(--accent); text-align: center; line-height: 1.1; }

        .btn { 
            width: 100%; height: clamp(24px, 3.5vh, 34px); 
            background: #27ae60; color: #fff; border: none; border-radius: 6px; 
            font-size: clamp(12px, 1.8vh, 16px); margin: 1px 0; font-family: 'TibetWildYak';
        }

        #status-box { 
            background: #fff; border-radius: 6px; border: 1px solid #ddd; 
            padding: 2px; text-align: center; margin-bottom: 2px;
        }
        #clock { display: none; } 
        #msg { 
            font-size: clamp(12px, 2vh, 18px); font-weight: bold; color: var(--accent); 
            border: 1px solid var(--accent); border-top: 3px solid var(--accent);
            border-radius: 5px; padding: 1px; min-height: 1.4em;
            display: flex; align-items: center; justify-content: center;
        }

        .content-area {
            flex: 1;
            display: grid;
            grid-template-rows: 5fr 4fr; 
            gap: 4px; 
            min-height: 0;
            overflow: hidden;
        }

        /* 针对 iPhone 这种长比例屏幕的特别优化 */
        @media screen and (max-aspect-ratio: 1/2), (max-width: 500px) and (orientation: portrait) {
            .content-area { gap: 15px; } /* 拉大上下两个表格的间距 */
            #msg { padding: 8px 1px; }    /* 拉高提示框高度 */
            .top-components { margin-bottom: 10px; } /* 增加顶部间距 */
        }

        .section-box {
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 8px;
            border: 1px solid var(--accent);
            border-top: 5px solid var(--accent);
            overflow: hidden;
            min-height: 0;
        }

        .grid-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .grid-row { display: flex; flex: 1; border-bottom: 1px solid #eee; min-height: 0; }
        .grid-row:last-child { border-bottom: none; }
        
        .grid-header { background: #fcfcfc; flex: 0 0 auto; height: clamp(20px, 3vh, 28px); border-bottom: 1px solid #eee; }

        .cell { 
            flex: 1; width: 0; display: flex; align-items: center; justify-content: center;
            border-right: 1px solid #eee; font-size: clamp(10px, 1.8vh, 17px);
            text-align: center; line-height: 1; padding: 1px; overflow: hidden;
        }
        
        .cell-inner { white-space: nowrap; display: inline-block; transform-origin: center; }
        .grid-header .cell { font-size: clamp(9px, 1.4vh, 14px); color: var(--blue); font-weight: bold; }
        .cell:last-child { border-right: none; }
        .num-col { flex: 0 0 12%; color: #8b0000; font-weight: bold; background: #fafafa; }

        .col-today { background-color: #fffafa !important; }
        .active-cell { background-color: var(--accent) !important; color: white !important; font-weight: bold; }

        @media (orientation: landscape) {
            .wrapper { padding-left: 60px; padding-right: 60px; }
            .content-area { gap: 4px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-components">
        <header><div class="t-name">དགེན་ཁམས་པ་ཚང་།</div></header>
        <button class="btn" id="audioBtn" onclick="activateAudio()">སྒྲ་གཏོང་ལམ་བཟོ་བ།</button>
        <div id="status-box">
            <div id="clock">00:00:00</div>
            <div id="msg">...</div>
        </div>
    </div>

    <div class="content-area">
        <div class="section-box">
            <div class="grid-container">
                <div class="grid-row grid-header">
                    <div class="cell num-col"><span class="cell-inner">ཚོགས་ཐེངས།</span></div>
                    <div class="cell"><span class="cell-inner">ཟླ་བ།</span></div>
                    <div class="cell"><span class="cell-inner">མིག་དམར།</span></div>
                    <div class="cell"><span class="cell-inner">ལྷག་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཕུར་བུ།</span></div>
                    <div class="cell"><span class="cell-inner">པ་སངས་།</span></div>
                    <div class="cell"><span class="cell-inner">སྤེན་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཉི་མ།</span></div>
                </div>
                <div id="grid-morning" style="display:contents"></div>
            </div>
        </div>
        <div class="section-box">
            <div class="grid-container">
                <div class="grid-row grid-header">
                    <div class="cell num-col"><span class="cell-inner">ཚོགས་ཐེངས།</span></div>
                    <div class="cell"><span class="cell-inner">ཟླ་བ།</span></div>
                    <div class="cell"><span class="cell-inner">མིག་དམར།</span></div>
                    <div class="cell"><span class="cell-inner">ལྷག་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཕུར་བུ།</span></div>
                    <div class="cell"><span class="cell-inner">པ་སངས་།</span></div>
                    <div class="cell"><span class="cell-inner">སྤེན་པ།</span></div>
                    <div class="cell"><span class="cell-inner">ཉི་མ།</span></div>
                </div>
                <div id="grid-afternoon" style="display:contents"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const cfg = { mS: "09:30", aS: "15:00", dur: 40, myKeys: ["རི་མོ།", "གླུ་གཞས།", "ཡིག་གཟུགས།"] };
    const morningData = [["༡","","","","","","",""],["༢","","","","","","",""],["༣","རི་མོ།༡","","","རི་མོ།༢","","",""],["༤","ངལ་རྩོལ།","","","","ཡིག་གཟུགས།","",""]];
    const afternoonData = [["༡","","རི་མོ།༢","","","","",""],["༢","","","གླུ་གཞས།","","སློབ་གསོ།","",""],["༣","","རི་མོ།༡","","","","",""]];

    let audioCtx = null;
    let isAudioMuted = false;
    let currentReminderKey = ""; 
    let reminderStartTime = 0;

    function timeAdd(t, m) { 
        let [h, min] = t.split(':').map(Number); 
        let d = new Date(); d.setHours(h, min + m); 
        return d.toTimeString().slice(0, 5); 
    }

    const slots = [];
    let cm = cfg.mS; for(let i=0; i<4; i++) { let s = cm, e = timeAdd(s, cfg.dur); slots.push({s, e}); cm = timeAdd(e, i===1 ? 20 : 15); }
    let ca = cfg.aS; for(let i=0; i<3; i++) { let s = ca, e = timeAdd(s, cfg.dur); slots.push({s, e}); ca = timeAdd(e, 15); }

    function renderGrid(id, data, start) {
        const container = document.getElementById(id);
        data.forEach((r, idx) => {
            let row = document.createElement('div');
            row.className = 'grid-row';
            row.innerHTML = `<div class="cell num-col"><span class="cell-inner">${r[0]}</span></div>`;
            for(let i=1; i<=7; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                let inner = document.createElement('span');
                inner.className = 'cell-inner';
                inner.innerText = r[i] || "";
                cell.id = `c-${start+idx}-${i}`;
                if(r[i] && cfg.myKeys.some(k => r[i].includes(k))) cell.style.color = "var(--accent)";
                cell.appendChild(inner);
                row.appendChild(cell);
            }
            container.appendChild(row);
        });
    }

    renderGrid('grid-morning', morningData, 0);
    renderGrid('grid-afternoon', afternoonData, 4);

    function playBeep() {
        if (!audioCtx || isAudioMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function stopAudioRemind() {
        isAudioMuted = true;
        const btn = document.getElementById('audioBtn');
        btn.style.background = "#27ae60";
        btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།";
    }

    function refresh() {
        const now = new Date();
        const nowS = now.toTimeString().slice(0, 5);
        const wk = now.getDay(); 
        const realWk = (wk === 0) ? 7 : wk; 
        document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', {hour12:false});
        const msgEl = document.getElementById('msg');
        
        slots.forEach((t, i) => {
            for(let j=1; j<=7; j++) {
                const cell = document.getElementById(`c-${i}-${j}`);
                if (cell) {
                    cell.classList.remove('col-today', 'active-cell');
                    if (j === realWk) {
                        cell.classList.add('col-today');
                        if (nowS >= t.s && nowS < t.e) cell.classList.add('active-cell');
                    }
                }
            }

            if (realWk < 6) {
                [40, 5].forEach(offset => {
                    const triggerTime = timeAdd(t.s, -offset);
                    const key = `slot-${i}-${offset}`;
                    if (nowS === triggerTime && currentReminderKey !== key) {
                        currentReminderKey = key; isAudioMuted = false;
                        reminderStartTime = Date.now();
                        const btn = document.getElementById('audioBtn');
                        btn.style.background = "#e67e22"; btn.innerText = "🔔 སྒྲ་མཚམས་འཇོག་པ།";
                    }
                });
            }
        });

        if (currentReminderKey !== "" && !isAudioMuted) {
            const elapsed = Math.floor((Date.now() - reminderStartTime) / 60000);
            if (elapsed < 6) {
                if (elapsed % 2 === 0 && now.getMilliseconds() < 1000 && now.getSeconds() % 2 === 0) playBeep();
            } else { stopAudioRemind(); }
        }

        if (realWk >= 6) {
            msgEl.innerText = (realWk === 6) ? "དེ་རིང་གཟའ་སྤེན་པ་རེད། དགེན་ལགས་གཟའ་མཇུག་སྤྲོ།" : "དེ་རིང་གཟའ་ཉི་མ་རེད། དགེན་ལགས་གཟའ་མཇུག་སྤྲོ།";
        } else {
            const full = [...morningData, ...afternoonData];
            let currentSlotIndex = -1;
            slots.forEach((t, i) => { if (nowS >= t.s && nowS < t.e) currentSlotIndex = i; });

            if (currentSlotIndex !== -1) {
                const curTask = full[currentSlotIndex][realWk];
                msgEl.innerText = curTask ? `དེ་རིང་སློབ་ཚན་ཡོད།: ${curTask}` : "";
            } else {
                msgEl.innerText = "";
            }
        }
        
        document.querySelectorAll('.cell').forEach(c => {
            const inner = c.querySelector('.cell-inner');
            if(inner && inner.innerText !== "") {
                inner.style.transform = "scale(1)";
                const ratio = (c.offsetWidth - 6) / inner.offsetWidth;
                if(ratio < 1) inner.style.transform = `scale(${ratio})`;
            }
        });
    }

    function activateAudio() { 
        if (currentReminderKey !== "" && !isAudioMuted) { stopAudioRemind(); return; }
        const btn = document.getElementById('audioBtn');
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext(); playBeep(); 
            btn.style.background = "#27ae60"; btn.innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; 
        } catch (e) { btn.innerText = "སྒྲ་གཏོང་ལམ་བོ་མ་ཐུབ།"; }
    }

    setInterval(refresh, 1000); refresh();
    window.addEventListener('resize', refresh);
</script>
</body>
</html>
