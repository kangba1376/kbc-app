<!DOCTYPE html>
<html lang="bo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="apple-touch-icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="སློབ་ཚན།"> <title>སློབ་ཚན་རེའུ་མིག</title>
    <style>
        @font-face { font-family: 'TibetWildYak'; src: url('TibetWildYak.ttf') format('truetype'); }
        :root { 
            --bg: #f8f9fa; --blue: #007aff; --green: #27ae60; --orange: #e67e22; 
            --white: #ffffff; --tibetan-red: #B22222; --indigo: #004080;
            --art-red: #FF0000; --music-blue: #0000FF; --calligraphy-navy: #000080; --other-gray: #A9A9A9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100svh; width: 100vw; background: var(--bg); 
            font-family: 'TibetWildYak', -apple-system, sans-serif;
            overflow: hidden; position: fixed;
        }
        .wrapper {
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            background: linear-gradient(rgba(248,249,250,0.92), rgba(248,249,250,0.92)), url('apple-touch-icon.png') no-repeat center center;
            background-size: 140px auto; 
        }
        .nav-bar { position: relative; height: 44px; display: flex; align-items: center; padding: 0 10px; }
        .nav-left { position: absolute; left: 10px; z-index: 10; }
        .nav-right { position: absolute; right: 10px; z-index: 10; }
        .t-name { width: 100%; text-align: center; font-size: 20px; font-weight: bold; color: var(--indigo); }
        .time-display { font-size: 13px; color: var(--blue); font-weight: bold; }
        .btn-mini { background: var(--green); color: #fff; border: none; border-radius: 4px; padding: 6px 10px; font-family: 'TibetWildYak'; cursor: pointer; }
        
        .status-area { padding: 0 10px; margin-bottom: 4px; }
        #msg { 
            font-size: 18px; font-weight: bold; color: var(--tibetan-red); 
            border: 2px solid var(--tibetan-red); border-top: 4px solid var(--tibetan-red);
            border-radius: 8px; padding: 8px; text-align: center; min-height: 44px;
            background: rgba(255, 255, 255, 0.7);
        }

        .content-area { flex: 1; display: flex; flex-direction: column; gap: 4px; padding: 0 8px; overflow: hidden; }
        .section-box { 
            flex: 1; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.6); 
            border-radius: 8px; border: 1px solid var(--tibetan-red); border-top: 5px solid var(--tibetan-red); min-height: 0;
        }
        .grid-row { display: flex; flex: 1; border-bottom: 1px solid rgba(238,238,238,0.5); min-height: 0; }
        .grid-header { background: rgba(252, 252, 252, 0.6); flex: 0 0 32px; font-weight: bold; color: #008080; }
        
        .cell { flex: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid rgba(238,238,238,0.5); font-size: 14px; position: relative; overflow: hidden; padding: 0 2px; }
        .cell-inner { display: inline-block; white-space: nowrap !important; transform-origin: center center; flex-shrink: 0; font-weight: bold; }
        .num-col { flex: 0 0 12%; color: var(--blue); background: rgba(250, 250, 250, 0.6); font-weight: bold; }
        .active-cell { background-color: var(--tibetan-red) !important; color: #fff !important; }
        .active-cell .cell-inner { color: #fff !important; }
        .col-today { background-color: rgba(255, 250, 250, 0.5); }
        .diag-svg { position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none; }

        .art { color: var(--art-red); }
        .music { color: var(--music-blue); }
        .calligraphy { color: var(--calligraphy-navy); }
        .other { color: var(--other-gray); }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="nav-bar">
        <div class="nav-left"><button class="btn-mini" id="audioBtn" onclick="activateAudio()">སྒྲ་གཏོང་ལམ་བཟོ་བ།</button></div>
        <div class="t-name">དགེན་ཁམས་པ་ཚང་།</div>
        <div class="nav-right"><div class="time-display" id="real-time">--:--:--</div></div>
    </div>
    <div class="status-area"><div id="msg">...</div></div>
    <div class="content-area">
        <div class="section-box" id="grid-morning"></div>
        <div class="section-box" id="grid-afternoon"></div>
    </div>
</div>

<script>
    let audioCtx = null, isAudioMuted = false, currentReminderKey = "";
    const toM = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

    const slots = [{s: "09:30", e: "10:10"}, {s: "10:25", e: "11:05"}, {s: "11:30", e: "12:10"}, {s: "12:25", e: "13:05"}, {s: "15:00", e: "15:40"}, {s: "15:55", e: "16:35"}, {s: "16:50", e: "17:30"}];
    const mData = [["༡","","","","","","",""],["༢","","","","","","",""],["༣","རི་མོ།༡","","","རི་མོ།༢","","",""],["༤","ངལ་རྩོལ།","","","","ཡིགཟུགས།","",""]];
    const aData = [["༡","","རི་མོ།༢","","","","",""],["༢","","","གླུ་གཞས།","","སློབ་གསོ།","",""],["༣","","རི་མོ།༡","","","","",""]];

    function getLessonClass(name) {
        if (!name) return "";
        if (name.includes("རི་མོ།")) return "art";
        if (name.includes("གླུ་གཞས།")) return "music";
        if (name.includes("ཡིགཟུགས།")) return "calligraphy";
        return "other";
    }

    function render(id, data, startIdx) {
        const el = document.getElementById(id);
        let h = `<div class="grid-row grid-header"><div class="cell num-col" style="position:relative"><svg class="diag-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100" stroke="#B22222" stroke-width="1.5"/></svg></div>`;
        ["ཟླ་བ།","མིག་དམར།","ལྷག་པ།","ཕུར་བུ།","པ་སངས་།","སྤེན་པ།","ཉི་མ།"].forEach(d => h += `<div class="cell"><span class="cell-inner">${d}</span></div>`);
        el.innerHTML = h + `</div>` + data.map((r, i) => 
            `<div class="grid-row"><div class="cell num-col"><span class="cell-inner">${r[0]}</span></div>` + 
            r.slice(1).map((c, j) => {
                const cls = c ? getLessonClass(c) : "";
                return `<div class="cell" id="c-${startIdx+i}-${j+1}"><span class="cell-inner ${cls}">${c}</span></div>`;
            }).join('') + `</div>`
        ).join('');
    }
    render('grid-morning', mData, 0); render('grid-afternoon', aData, 4);

    function playBeep() {
        if (!audioCtx || isAudioMuted) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.5);
    }

    function activateAudio() {
        if (currentReminderKey !== "" && !isAudioMuted) { isAudioMuted = true; document.getElementById('audioBtn').style.background = "var(--green)"; return; }
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); playBeep(); document.getElementById('audioBtn').innerText = "སྒྲ་གཏོང་ལམ་བཟོས་ཟིན།"; } catch(e){}
    }

    function doAutoScale() {
        document.querySelectorAll('.cell').forEach(cell => {
            const inner = cell.querySelector('.cell-inner');
            if (!inner || inner.innerText.trim() === "") return;
            inner.style.transform = 'scale(1)'; 
            const containerWidth = cell.clientWidth - 4; 
            const contentWidth = inner.offsetWidth; 
            if (contentWidth > containerWidth && containerWidth > 0) {
                inner.style.transform = `scale(${containerWidth / contentWidth})`;
            }
        });
    }

    function refresh() {
        const now = new Date(), currentM = now.getHours() * 60 + now.getMinutes(), day = now.getDay() || 7;
        document.getElementById('real-time').innerText = now.toTimeString().slice(0, 8);
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-cell', 'col-today'));
        document.querySelectorAll(`[id$="-${day}"]`).forEach(c => c.classList.add('col-today'));
        let currentLessonIdx = -1;
        slots.forEach((s, i) => {
            const startM = toM(s.s), endM = toM(s.e);
            if (currentM >= startM && currentM < endM) {
                currentLessonIdx = i;
                document.getElementById(`c-${i}-${day}`)?.classList.add('active-cell');
            }
            if (day < 6) {
                [40, 5].forEach(off => {
                    if (currentM === startM - offset && currentReminderKey !== `r-${i}-${offset}`) {
                        currentReminderKey = `r-${i}-${offset}`; isAudioMuted = false;
                        document.getElementById('audioBtn').style.background = "var(--orange)";
                        if (now.getSeconds() % 2 === 0) playBeep();
                    }
                });
            }
        });
        doAutoScale();
        const msgEl = document.getElementById('msg');
        const myKeys = ["རི་མོ།", "གླུ་གཞས།", "ཡིགཟུགས།"];
        const fullData = [...mData, ...aData];
        const myTodayLessons = fullData.map((r, i) => myKeys.some(k => r[day].includes(k)) ? i : -1).filter(i => i !== -1);
        if (day >= 6) { msgEl.innerText = "གཟའ་མཇུག་ངལ་གསོ།"; } 
        else if (currentLessonIdx !== -1 && myTodayLessons.includes(currentLessonIdx)) { msgEl.innerText = "ད་ལྟ་སློབ་ཚན་ཚོགས་བཞིན་པ་ཡིན།"; } 
        else if (myTodayLessons.length > 0 && currentM >= toM(slots[myTodayLessons[myTodayLessons.length-1]].e)) { msgEl.innerText = "དེ་རིང་གི་སློབ་ཚན་མཇུག་སྒྲིལ་ཟིན།"; } 
        else { msgEl.innerText = "དགེན་ལགས་དེ་རིང་སློབ་ཚན་ཡོད།"; }
    }
    setInterval(refresh, 1000);
    window.addEventListener('resize', doAutoScale);
    document.fonts.ready.then(doAutoScale);
    refresh();
</script>
</body>
</html>
